# =============================================================================
# AgentOS Gateway 配置文件
# 版本: 1.0.0
# 基于源码: agentos/gateway/src/gateway/*.c
# =============================================================================

gateway:
  # 监听地址
  bind_address: "0.0.0.0"
  port: 18789

  # 协议配置（对应 http_gateway.c, ws_gateway.c, stdio_gateway.c）
  protocols:
    http:
      enabled: true
      read_timeout_ms: 30000
      write_timeout_ms: 30000
      max_request_size_mb: 10

      # CORS 配置（跨域资源共享）
      cors:
        allowed_origins:
          - "http://localhost:5173"
          - "http://127.0.0.1:5173"
          - "https://*.spharx.cn"
        allowed_methods:
          - "GET"
          - "POST"
          - "PUT"
          - "DELETE"
          - "OPTIONS"
        allowed_headers:
          - "Content-Type"
          - "Authorization"
          - "X-Request-ID"
        max_age: 86400
        allow_credentials: true

    websocket:
      enabled: true
      ping_interval_sec: 30
      pong_timeout_sec: 10
      max_message_size_mb: 5
      max_connections: 1000

    stdio:
      enabled: true
      batch_mode: false
      input_buffer_size_kb: 64
      output_buffer_size_kb: 256

  # 速率限制（基于 gateway_rate_limiter.c）
  rate_limiting:
    # 全局限制
    global_qps: 10000           # 每秒请求数
    global_burst: 100           # 突发容量

    # 单 IP 限制
    per_ip_qps: 100             # 每 IP 每秒请求数
    per_ip_burst: 20            # 每 IP 突发容量

    # 白名单（不受限流影响）
    whitelist_ips:
      - "127.0.0.1"
      - "::1"

  # 上游连接配置（连接 Kernel IPC）
  upstream:
    endpoint: "http://kernel:18080"   # 内核 IPC 地址
    timeout_ms: 5000                  # 请求超时
    connect_timeout_ms: 2000         # 连接超时
    max_retries: 3                   # 最大重试次数
    retry_delay_ms: 100              # 重试延迟
    pool_size: 10                    # 连接池大小

  # 日志配置
  logging:
    level: info                     # debug | info | warn | error
    format: json                    # json | text
    access_log: "/var/log/agentos/gateway_access.log"
    error_log: "/var/log/agentos/gateway_error.log"
    max_log_size_mb: 100             # 单个日志文件最大大小
    log_rotation_count: 5            # 保留的轮转日志数量
    include_request_body: false       # 是否在日志中包含请求体
    include_response_body: false     # 是否在日志中包含响应体

  # JSON-RPC 配置（基于 jsonrpc.c）
  jsonrpc:
    version: "2.0"                  # JSON-RPC 版本
    batch_enabled: true              # 支持批量请求
    max_batch_size: 50               # 批量请求最大条目数
    notification_id_required: false  # 通知是否需要 id 字段

  # Syscall 路由配置（基于 syscall_router.c）
  syscall_routing:
    prefix: "/api/v1"                # API 路径前缀
    enable_fallback: true            # 未匹配路由时的默认处理

  # 安全配置
  security:
    # 认证配置
    auth:
      enabled: true
      jwt_secret: "${GATEWAY_JWT_SECRET}"  # 从环境变量读取
      jwt_issuer: "agentos-gateway"
      token_expiry_hours: 24
      refresh_token_expiry_days: 7

    # IP 黑名单
    ip_blacklist: []

    # 请求体大小限制
    max_content_length_mb: 10

    # 压缩配置
    compression:
      enabled: true
      min_length_bytes: 1024         # 最小压缩长度
      level: 6                       # 压缩级别 (1-9)

  # 可观测性
  observability:
    # Prometheus 指标导出
    metrics:
      enabled: true
      path: /metrics
      namespace: agentos_gateway

    # 分布式追踪
    tracing:
      enabled: true
      sampler_ratio: 1.0             # 采样率 (0.0-1.0)
      service_name: "agentos-gateway"
      exporter_endpoint: "http://jaeger:14268/api/traces"

    # 请求 ID 生成
    request_id:
      enabled: true
      header_name: "X-Request-ID"
      length: 32                      # ID 长度
