environment=AGENTOS_HOME="/app",LOG_LEVEL="%(ENV_LOG_LEVEL)s"

[program:sched_d]
command=python3 -m agentos.daemon.sched_d --config /app/config/sched.yaml
directory=/app
autostart=true
autorestart=true
startretries=3
startsecs=5
stopwaitsecs=10
user=agentos
