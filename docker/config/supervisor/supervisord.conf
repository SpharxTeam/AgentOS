stdout_logfile_backups=5
environment=AGENTOS_HOME="/app",LOG_LEVEL="%(ENV_LOG_LEVEL)s"

; =============================================================================
; 进程组定义（便于批量管理）
; =============================================================================

[group:daemon-services]
programs=llm_d,market_d,monit_d,sched_d,tool_d,gateway_d
priority=999
