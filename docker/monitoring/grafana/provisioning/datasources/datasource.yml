# Prometheus数据源配置
apiVersion: 1

datasources:
  - name: 'Prometheus'
    type: 'prometheus'
    access: 'proxy'
    url: 'http://prometheus:9090'
    isDefault: true
    jsonData:
      timeInterval: '15s'
      httpMethod: 'POST'
      manageAlerts: true
      prometheusType: 'Prometheus'
    editable: false
