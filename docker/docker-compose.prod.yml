version: '3.8'

# =============================================================================
# AgentOS Docker Compose - 生产环境 (Production)
# 版本: 2.0.0 (High-Availability Production Deployment)
# 最后更新: 2026-04-06
#
# 🎯 生产级设计原则:
# 🔒 安全第一: 最小权限、只读文件系统、seccomp 加固、禁止特权模式
# 🛡️ 高可用性: 多实例部署、健康检查、自动重启、优雅降级
# 📊 可观测性: Prometheus + Grafana 全链路监控 + 分布式追踪
# ⚡ 性能保障: CPU/内存限制、连接池调优、缓存策略
# 🔄 数据安全: ACID 事务、AOF/RDB 持久化、自动备份
#
# 📋 使用方法:
#   # 1️⃣ 首次部署前，必须创建 .env.production 文件并配置所有密钥：
#      cp .env.production.example .env.production
#      vim .env.production  # 编辑所有密码和密钥！
#
#   # 2️⃣ 启动生产环境（所有核心服务）：
#      docker compose -f docker/docker-compose.prod.yml --env-file .env.production up -d
#
#   # 3️⃣ 扩展 Kernel 实例数（水平扩展）：
#      docker compose -f docker/docker-compose.prod.yml --env-file .env production up -d --scale kernel=3
#
#   # 4️⃣ 查看服务状态和健康情况：
#      docker compose -f docker/docker-compose.prod.yml --env-file .env production ps
#      docker compose -f docker/docker-compose.prod.yml --env-file .env production logs -f gateway kernel
#
#   # 5️⃣ 优雅停机（等待请求处理完成）：
#      docker compose -f docker/docker-compose.prod.yml --env-file .env production down --timeout 60
#
#   # 6️⃣ 完全清理（⚠️ 会删除所有数据卷！）：
#      docker compose -f docker/docker-compose.prod.yml --env-file .env production down -v
#
# ⚠️ 重要警告:
# - 绝对不要将 .env.production 文件提交到版本控制系统！
# - 所有敏感信息（密码、JWT 密钥、API Keys）必须通过环境变量注入
# - 生产环境默认不暴露内部端口（18080），所有外部流量通过 Gateway (18789) 进入
#
# 🔗 生产架构拓扑:
#   [Internet/CDN]
#        ↓ HTTPS :443
#   [Load Balancer/Nginx]
#        ↓ HTTP :18789
#   [Gateway Cluster] ←→ [Kernel Cluster:18080]
#        ↓                    ↓
#   [Redis Sentinel]    [PostgreSQL HA]
#        ↓
#   [Prometheus] → [Grafana] → [AlertManager]
# =============================================================================

services:
  # ===========================================================================
  # 内核服务集群 (Kernel Cluster) - AgentOS 微内核核心
  # 基于: Dockerfile.kernel (target: runtime)
  # 扩展方式: docker compose ... up -d --scale kernel=N
  #
  # 📌 生产特性:
  # - 只读文件系统（防止运行时篡改）
  # - seccomp 安全配置文件（限制危险系统调用）
  # - 能力白名单（仅保留 NET_BIND_SERVICE）
  # - 非 root 用户运行（agentos:1000）
  # - 资源限制（CPU/Memory cgroups）
  # ===========================================================================
  kernel:
    build:
      context: ..
      dockerfile: docker/Dockerfile.kernel
      target: runtime                      # ✅ 使用 runtime target（Release 构建）
      args:
        BUILD_TYPE: Release                # 生产使用 Release 模式（无调试符号）
        ENABLE_TESTS: OFF                  # 生产禁用测试
    image: spharx/agentos-kernel:${AGENTOS_VERSION:-2.0.0}
    container_name: agentos-kernel-prod
    hostname: agentos-kernel
    restart: always                       # 始终重启（包括 Docker daemon 重启）

    # ⚠️ 生产环境不直接暴露 Kernel 端口！
    # 所有外部访问通过 Gateway (18789) 进入
    # 仅在调试时临时取消注释以下行：
    # ports:
    #   - "${KERNEL_IPC_PORT:-18080}:18080"       # 内核 IPC API（仅内网访问）
    #   - "${KERNEL_METRICS_PORT:-9090}:9090"     # Prometheus Metrics

    # 卷挂载（数据持久化 + 配置只读）
    volumes:
      # 配置文件（只读，防止篡改）
      - ./config:/app/config:ro
      # HeapStore 六大数据分区（基于 heapstore.h path_type_t 枚举）
      - heapstore-prod-data:/var/lib/agentos/data:rw         # PATH_KERNEL
      - heapstore-prod-logs:/var/lib/agentos/logs:rw          # PATH_LOGS
      - heapstore-prod-registry:/var/lib/agentos/registry:rw   # PATH_REGISTRY
      - heapstore-prod-traces:/var/lib/agentos/traces:rw       # PATH_TRACES
      - heapstore-prod-ipc:/var/lib/agentos/ipc:rw            # PATH_KERNEL_IPC
      - heapstore-prod-memory:/var/lib/agentos/memory:rw       # PATH_KERNEL_MEMORY

    # 环境变量（生产级配置，敏感值从 .env 注入）
    environment:
      # 日志级别（生产使用 INFO，避免 DEBUG 泄露敏感信息）
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Cupolas 安全框架（生产严格模式）
      - AGENTOS_CUPOLAS_ENABLED=true
      - AGENTOS_PERMISSION_MODE=strict           # 严格权限控制
      - AGENTOS_SANITIZER_MODE=strict             # 严格输入校验（防注入）
      - AGENTOS_AUDIT_ENABLED=true                # 启用审计日志（合规要求）
      # HeapStore 生产配置
      - HEAPSTORE_ROOT_PATH=/var/lib/agentos/data
      - HEAPSTORE_MAX_LOG_SIZE_MB=${HEAPSTORE_MAX_LOG_SIZE:-500}       # 生产增大日志上限
      - HEAPSTORE_LOG_RETENTION_DAYS=${HEAPSTORE_LOG_RETENTION:-90}    # 保留 90 天
      - HEAPSTORE_TRACE_RETENTION_DAYS=30                          # 追踪数据保留 30 天
      - HEAPSTORE_AUTO_CLEANUP=true
      - HEAPSTORE_CIRCUIT_THRESHOLD=${HEAPSTORE_CIRCUIT_THRESHOLD:-10}  # 提高熔断阈值
      - HEAPSTORE_CIRCUIT_TIMEOUT_SEC=${HEAPSTORE_CIRCUIT_TIMEOUT:-60} # 增加熔断超时
      # 连接池和生产参数
      - AGENTOS_MAX_CONNECTIONS=${MAX_CONNECTIONS:-10000}
      - AGENTOS_MEMORY_LIMIT=${MEMORY_LIMIT:-8192}              # MB
      - AGENTOS_CPU_CORES=${CPU_CORES:-8}
      # 时区和字符集
      - TZ=${TZ:-Asia/Shanghai}
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8

    # 网络（仅后端网络，不对外暴露）
    networks:
      - agentos-backend-prod

    # 服务依赖（数据库必须健康才能启动）
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    # 健康检查（多层检测机制）
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18080/api/v1/health"]
      interval: 30s                        # 每 30 秒检查一次
      timeout: 10s                         # 单次超时 10 秒
      retries: 3                           # 连续失败 3 次标记为 unhealthy
      start_period: 60s                     # 启动后等待 60 秒再开始检查

    # 资源限制（cgroups 隔离）
    deploy:
      resources:
        limits:
          cpus: '${CPU_LIMIT:-4}'           # 最大 CPU 核心数
          memory: ${MEMORY_LIMIT:-4G}       # 最大内存（OOM Killer 上限）
        reservations:
          cpus: '${CPU_RESERVATION:-2}'     # 保留 CPU（Kubernetes 调度保证）
          memory: ${MEMORY_RESERVATION:-2G} # 保留内存（避免 OOM）
      replicas: ${KERNEL_REPLICAS:-1}       # 默认单实例，可按需扩展
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 120s

    # 🔒 安全加固（CIS Docker Benchmark 合规）
    security_opt:
      - no-new-privileges:true              # CIS 5.11: 禁止获取新权限
      - seccomp:./config/seccomp-profile.json  # CIS 5.7: 自定义 seccomp 配置
    read_only: true                         # CIS 5.9: 只读文件系统（防止篡改）
    tmpfs:
      - /tmp:size=512M,mode=1777            # 临时目录（可写但限大小）
      - /run:size=64M,mode=1755             # 运行时 PID 文件
    cap_drop:
      - ALL                                 # CIS 5.10: 丢弃所有能力
    cap_add:
      - NET_BIND_SERVICE                    # 仅保留绑定端口能力（必需）

    # 日志配置（JSON 格式 + 自动轮转 + 外部聚合）
    logging:
      driver: json-file
      options:
        max-size: "${LOG_MAX_SIZE:-100m}"   # 单个日志文件最大 100MB
        max-file: "${LOG_MAX_FILE:-5}"      # 最多保留 5 个文件（共 500MB）
        labels: "service,environment,version"
        tag: "agentos-kernel"

  # ===========================================================================
  # Gateway 网关集群 - 统一 API 入口（HTTP + WebSocket + stdio）
  # 基于: Dockerfile.daemon (target: gateway)
  #
  # 📌 关键说明:
  # - 所有外部流量必须通过 Gateway 进入（单一入口原则）
  # - 支持 Python SDK v3.0.0 默认端口 18789
  # - 内置 JWT 认证、速率限制、CORS、IP 黑名单
  # - 连接池管理到 Kernel 后端（负载均衡 + 熔断器）
  # ===========================================================================
  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.daemon
      target: gateway                      # ✅ 使用 gateway target
    image: spharx/agentos-gateway:${AGENTOS_VERSION:-2.0.0}
    container_name: agentos-gateway-prod
    hostname: agentos-gateway
    restart: always

    # 对外暴露端口（唯一对外入口）
    ports:
      - "${GATEWAY_PORT:-18789}:18789"      # 主端口：HTTP API + WebSocket
      - "${GATEWAY_ADMIN_PORT:-18790}:18790" # 管理端口：Admin API（限制 IP 访问）

    # 卷挂载
    volumes:
      # Gateway 配置文件（含 CORS、限流、JWT、上游连接等）
      - ./config/gateway.yaml:/app/config/gateway.yaml:ro

    # 环境变量（生产级安全配置）
    environment:
      # Gateway 基础配置
      - GATEWAY_BIND_ADDRESS=0.0.0.0
      - GATEWAY_PORT=18789
      - GATEWAY_ADMIN_PORT=18790
      # 上游连接（指向 Kernel 集群，支持 DNS 轮询负载均衡）
      - GATEWAY_UPSTREAM_URL=http://kernel:18080
      # 协议启用（三协议全开）
      - GATEWAY_PROTOCOLS=http,websocket,stdio
      # 速率限制（生产环境严格限制）
      - GATEWAY_GLOBAL_QPS=${GATEWAY_GLOBAL_QPS:-5000}     # 全局 QPS（比开发低）
      - GATEWAY_PER_IP_QPS=${GATEWAY_PER_IP_QPS:-50}       # 单 IP QPS（防 DDoS）
      # 🔐 JWT 认证配置（必须从 .env 注入强密钥！）
      - GATEWAY_JWT_SECRET=${GATEWAY_JWT_SECRET:?❌ ERROR: 必须设置 GATEWAY_JWT_SECRET}
      - GATEWAY_JWT_ISSUER=agentos-gateway-production
      - GATEWAY_TOKEN_EXPIRY_HOURS=${TOKEN_EXPIRY_HOURS:-8}
      - GATEWAY_REFRESH_TOKEN_EXPIRY_DAYS=${REFRESH_TOKEN_DAYS:-7}
      # 时区
      - TZ=${TZ:-Asia/Shanghai}
      - LANG=C.UTF-8

    # 网络（跨前后端网络，作为流量入口）
    networks:
      - agentos-backend-prod               # 连接 Kernel、Redis、PostgreSQL
      - agentos-frontend-prod              # 接收外部流量

    # 依赖关系
    depends_on:
      kernel:
        condition: service_healthy

    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/api/v1/health"]
      interval: 15s                        # 更频繁检查（网关是关键路径）
      timeout: 5s
      retries: 3
      start_period: 20s

    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 512M
      replicas: ${GATEWAY_REPLICAS:-1}     # 可多实例部署（需前置 LB）
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
        window: 60s

    # 安全加固
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=256M,mode=1777
      - /run:size=32M,mode=1755
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

    # 日志配置
    logging:
      driver: json-file
      options:
        max-size: "${LOG_MAX_SIZE:-100m}"
        max-file: "${LOG_MAX_FILE:-5}"
        labels: "service,environment"
        tag: "agentos-gateway"

  # ===========================================================================
  # PostgreSQL 高可用数据库集群（HeapStore 慢速存储层）
  # 用途: ACID 事务保证、结构化查询、复杂关联查询
  # 版本: PostgreSQL 15 Alpine
  #
  # 📌 生产特性:
  # - 连接池调优（max_connections, shared_buffers）
  # - 慢查询日志（log_min_duration_statement）
  # - WAL 归档（Point-in-Time Recovery）
  # - 内存优化（work_mem, maintenance_work_mem）
  # ===========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: agentos-postgres-prod
    hostname: agentos-postgres
    restart: always

    # ⚠️ 生产环境不直接暴露端口！通过内网访问
    # 如需外部维护，临时取消注释并限制 IP：
    # ports:
    #   - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"  # 仅本地回环访问

    # 卷挂载（数据持久化 + 性能优化）
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data:rw  # PGDATA 目录

    # 环境变量（必须从 .env 注入强密码！）
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agentos}
      POSTGRES_USER: ${POSTGRES_USER:-agentos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?❌ ERROR: 必须设置 POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata       # 独立数据目录（性能优化）
      # 字符集和排序规则
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"

    # 网络
    networks:
      - agentos-backend-prod

    # 健康检查
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentos} -d ${POSTGRES_DB:-agentos}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s                    # PG 启动较慢（WAL 恢复等）

    # PostgreSQL 性能调优命令
    command:
      - "postgres"
      - "-c", "max_connections=${PG_MAX_CONNECTIONS:-200}"           # 最大连接数
      - "-c", "shared_buffers=${PG_SHARED_BUFFERS:-256MB}"          # 共享缓冲区
      - "-c", "effective_cache_size=${PG_EFFECTIVE_CACHE_SIZE:-1GB}" # 有效缓存大小
      - "-c", "work_mem=${PG_WORK_MEM:-4MB}"                          # 排序/哈希内存
      - "-c", "maintenance_work_mem=${PG_MAINTENANCE_WORK_MEM:-64MB}" # 维护操作内存
      - "-c", "wal_level=replica"                                    # WAL 级别（支持复制）
      - "-c", "max_wal_senders=3"                                     # 最大 WAL 发送进程
      - "-c", "wal_keep_size=1GB"                                     # WAL 保留大小
      - "-c", "log_statement=all"                                     # 记录所有 SQL（审计）
      - "-c", "log_min_duration_statement=${PG_SLOW_QUERY_MS:-1000}" # 慢查询阈值（1秒）
      - "-c", "log_checkpoints=on"                                    # 记录 checkpoint
      - "-c", "log_connections=on"                                    # 记录连接
      - "-c", "log_disconnections=on"                                 # 记录断开
      - "-c", "log_lock_waits=on"                                     # 记录锁等待
      - "-c", "log_temp_files=0"                                      # 记录临时文件

    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '${PG_CPU_LIMIT:-4}'
          memory: ${PG_MEMORY_LIMIT:-4G}
        reservations:
          cpus: '${PG_CPU_RESERVATION:-1}'
          memory: ${PG_MEMORY_RESERVATION:-1G}

    # 安全加固
    security_opt:
      - no-new-privileges:true

    # 日志配置
    logging:
      driver: json-file
      options:
        max-size: "${LOG_MAX_SIZE:-100m}"
        max-file: "${LOG_MAX_FILE:-5}"
        tag: "agentos-postgres"

  # ===========================================================================
  # Redis 高可用缓存集群（IPC 快速通道 + 权限缓存 + 会话存储）
  # 用途: 高速键值存储、发布订阅、分布式锁、Rate Limiting 计数器
  # 版本: Redis 7 Alpine
  #
  # 📌 生产特性:
  # - AOF 持久化（appendonly + appendfsync everysec）
  # - 内存淘汰策略（allkeys-lru）
  # - 密码认证（requirepass）
  # - 最大内存限制（防 OOM）
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: agentos-redis-prod
    hostname: agentos-redis
    restart: always

    # ⚠️ 生产环境不直接暴露端口！通过内网访问
    # ports:
    #   - "127.0.0.1:${REDIS_PORT:-6379}:6379"  # 仅本地回环访问

    # 卷挂载（AOF 持久化数据）
    volumes:
      - redis-prod-data:/data:rw

    # 启动命令（生产级 Redis 配置）
    command: >
      redis-server
      --appendonly yes                              # AOF 持久化开启
      --appendfsync everysec                        # 每秒同步（性能与安全的平衡点）
      --appendfilename "appendonly.aof"             # AOF 文件名
      --auto-aof-rewrite-percentage 100             # AOF 重写触发（增长 100%）
      --auto-aof rewrite-min-size 64mb              # AOF 最小重写大小
      --maxmemory ${REDIS_MAX_MEMORY:-1024mb}       # 最大内存 1GB（生产适当增大）
      --maxmemory-policy allkeys-lru               # 内存满时淘汰 LRU 键
      --requirepass ${REDIS_PASSWORD:?❌ ERROR: 必须设置 REDIS_PASSWORD}  # 🔐 密码认证
      --bind 0.0.0.0                               # 绑定地址（内网访问）
      --port 6379                                  # 端口
      --tcp-backlog 511                            # TCP 连接队列长度
      --timeout 300                                # 空闲超时（秒）
      --tcp-keepalive 300                          # TCP KeepAlive
      --save ""                                    # 禁用 RDB（仅用 AOF）
      --stop-writes-on-bgsave-error yes            # BGSAVE 失败时停止写入
      --databases 16                               # 数据库数量
      --loglevel notice                           # 日志级别
      --syslog-enabled no                         # 禁用 syslog
      --lazyfree-lazy-eviction yes                 # 惰性删除（避免阻塞）
      --lazyfree-lazy-expire yes                   # 过期键惰性删除
      --lazyfree-lazy-server-del yes               # 服务器 DEL 惰性删除

    # 网络
    networks:
      - agentos-backend-prod

    # 健康检查
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '${REDIS_CPU_LIMIT:-2}'
          memory: ${REDIS_MEMORY_LIMIT:-2G}
        reservations:
          cpus: '${REDIS_CPU_RESERVATION:-0.5}'
          memory: ${REDIS_MEMORY_RESERVATION:-256M}

    # 安全加固
    security_opt:
      - no-new-privileges:true

    # 日志配置
    logging:
      driver: json-file
      options:
        max-size: "${LOG_MAX_SIZE:-50m}"
        max-file: "${LOG_MAX_FILE:-5}"
        tag: "agentos-redis"

  # ===========================================================================
  # OpenLab 应用服务（Web UI + API Backend）- 生产模式
  # 用途: AgentOS 可视化管理界面和交互式实验平台
  # 注意: 此服务为可选组件，如未实现可注释掉整个 service 块
  # ===========================================================================
  openlab:
    build:
      context: ..
      dockerfile: docker/Dockerfile.openlab  # ⚠️ 需要创建此文件或替换为实际镜像
      target: production                     # 使用 production target
    image: spharx/agentos-openlab:${AGENTOS_VERSION:-2.0.0}
    container_name: agentos-openlab-prod
    hostname: agentos-openlab
    restart: always
    profiles:
      - openlab                             # 使用 profile 按需启动

    # 端口映射（生产环境建议通过反向代理暴露）
    ports:
      - "${OPENLAB_WEB_PORT:-443}:443"       # Web 前端（HTTPS）
      - "${OPENLAB_API_PORT:-8000}:8000"     # API 后端

    # 卷挂载
    volumes:
      - openlab-prod-data:/app/data:rw       # 用户数据持久化
      - openlab-ssl-certs:/etc/nginx/ssl:ro  # SSL 证书（Let's Encrypt 或自签名）

    # 环境变量
    environment:
      # OpenLab 配置
      - OPENLAB_DEBUG=false                  # ❌ 生产禁止 DEBUG 模式
      - OPENLAB_PORT=443
      # 连接 Gateway 作为统一 API 入口（推荐）
      - AGENTOS_GATEWAY_URL=http://gateway:18789
      # 直接连接 Kernel IPC（备用通道）
      - AGENTOS_IPC_URL=http://kernel:18080
      # 数据库连接（从 .env 注入）
      - DATABASE_URL=${DATABASE_URL:?❌ ERROR: 必须设置 DATABASE_URL}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0  # 🔐 含密码的 Redis URL
      # 🔐 应用密钥（必须从 .env 注入！）
      - OPENLAB_SECRET_KEY=${OPENLAB_SECRET_KEY:?❌ ERROR: 必须设置 OPENLAB_SECRET_KEY}
      - OPENLAB_SESSION_TIMEOUT=${SESSION_TIMEOUT:-3600}  # 会话超时（秒）
      # 时区
      - TZ=${TZ:-Asia/Shanghai}

    # 网络
    networks:
      - agentos-frontend-prod               # 通过 Gateway 访问后端

    # 依赖关系
    depends_on:
      - gateway

    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

    # 安全加固
    security_opt:
      - no-new-privileges:true

    # 日志配置
    logging:
      driver: json-file
      options:
        max-size: "${LOG_MAX_SIZE:-50m}"
        max-file: "${LOG_MAX_FILE:-5}"
        tag: "agentos-openlab"

  # ===========================================================================
  # Prometheus 监控系统（指标采集 + 告警引擎）
  # 用途: 收集所有服务的 metrics、PromQL 查询、告警规则评估
  # 版本: Prometheus v2.45.0
  # ===========================================================================
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: agentos-prometheus-prod
    hostname: agentos-prometheus
    restart: always

    # 端口映射（限制内网或 VPN 访问）
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9091}:9090"  # 仅本地访问（安全考虑）

    # 卷挂载
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro  # 抓取配置
      - ./monitoring/rules:/etc/prometheus/rules:ro                   # 告警规则 YAML
      - prometheus-prod-data:/prometheus:rw                           # TSDB 时序数据

    # 启动参数（生产级调优）
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--tsdb.path=/prometheus'
      - '--tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}'          # 保留 30 天数据
      - '--storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-20GB}'  # 最大 20GB
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/console_templates'
      - '--web.enable-lifecycle'                                       # 允许热加载配置
      - '--web.enable-admin-api'                                       # 允许管理 API（删除时间序列等）
      - '--query.timeout=2m'                                           # 查询超时 2 分钟
      - '--query.max-concurrency=20'                                   # 最大并发查询数

    # 网络
    networks:
      - agentos-backend-prod                 # 需要拉取所有服务的 /metrics

    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

    # 日志配置
    logging:
      driver: json-file
      options:
        max-size: "${LOG_MAX_SIZE:-50m}"
        max-file: "${LOG_MAX_FILE:-3}"
        tag: "agentos-prometheus"

  # ===========================================================================
  # Grafana 可视化平台（仪表盘 + 告警通知）
  # 用途: 基于 Prometheus 数据构建可视化仪表盘、告警通知渠道
  # 版本: Grafana 10.2.0
  # ===========================================================================
  grafana:
    image: grafana/grafana:10.2.0
    container_name: agentos-grafana-prod
    hostname: agentos-grafana
    restart: always

    # 端口映射（生产环境建议通过反向代理 + SSL 暴露）
    ports:
      - "${GRAFANA_PORT:-3000}:3000"         # Web UI

    # 环境变量（安全配置）
    environment:
      GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?❌ ERROR: 必须设置 GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP=false           # 禁止自助注册
      GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s/
      GF_AUTH_ANONYMOUS_ENABLED=false        # ❌ 生产禁止匿名访问
      GF_AUTH_BASIC_ENABLED=true             # 启用 Basic Auth
      GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-piechart-panel  # 预装插件
      GF_LOG_LEVEL=info                      # 日志级别
      GF_LOG_MODE=console                    # 输出到 console（Docker 日志驱动收集）

    # 卷挂载
    volumes:
      - grafana-prod-data:/var/lib/grafana:rw                                # 数据持久化
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro       # 自动配置
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro       # 仪表盘 JSON

    # 网络
    networks:
      - agentos-frontend-prod               # 外部可访问

    # 依赖关系
    depends_on:
      - prometheus

    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 128M

    # 安全加固
    security_opt:
      - no-new-privileges:true

    # 日志配置
    logging:
      driver: json-file
      options:
        max-size: "${LOG_MAX_SIZE:-20m}"
        max-file: "${LOG_MAX_FILE:-3}"
        tag: "agentos-grafana"

# =============================================================================
# 网络配置（生产环境双层隔离 + 安全组模拟）
# =============================================================================
networks:
  # ---------------------------------------------------------------------------
  # 后端网络：Kernel + Database + Cache + Monitoring（完全隔离，不对外暴露）
  # ---------------------------------------------------------------------------
  agentos-backend-prod:
    driver: bridge
    ipam:
      config:
        - subnet: ${BACKEND_SUBNET:-172.30.0.0/16}  # 后端子网（与开发环境隔离）
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "true"
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_forwarding: "true"

  # ---------------------------------------------------------------------------
  # 前端网络：Gateway + OpenLab + Grafana（可通过防火墙规则控制访问）
  # ---------------------------------------------------------------------------
  agentos-frontend-prod:
    driver: bridge
    ipam:
      config:
        - subnet: ${FRONTEND_SUBNET:-172.31.0.0/16}  # 前端子网（独立于后端）
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "true"
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_forwarding: "true"

# =============================================================================
# 卷定义（生产级持久化 + 命名便于运维管理 + 绑定挂载可选）
# =============================================================================
volumes:
  # ---------------------------------------------------------------------------
  # HeapStore 六大数据分区（对应 heapstore_path_type_t 枚举定义）
  # ---------------------------------------------------------------------------
  heapstore-prod-data:
    name: agentos_prod_heapstore_data       # PATH_KERNEL - 核心业务数据
    driver: local
    # 可选：绑定挂载到高性能 SSD（取消注释并修改路径）
    # driver_opts:
    #   type: none
    #   o: bind
    #   device: /data/ssd/agentos/kernel

  heapstore-prod-logs:
    name: agentos_prod_heapstore_logs       # PATH_LOGS - 运行日志（高频写入）
    driver: local

  heapstore-prod-registry:
    name: agentos_prod_heapstore_registry   # PATH_REGISTRY - 元数据/注册表
    driver: local

  heapstore-prod-traces:
    name: agentos_prod_heapstore_traces     # PATH_TRACES - 分布式追踪（Jaeger/OpenTelemetry）
    driver: local

  heapstore-prod-ipc:
    name: agentos_prod_heapstore_ipc        # PATH_KERNEL_IPC - IPC 通信缓存
    driver: local

  heapstore-prod-memory:
    name: agentos_prod_heapstore_memory     # PATH_KERNEL_MEMORY - 内存转储/堆快照
    driver: local

  # ---------------------------------------------------------------------------
  # 数据库持久化（ACID 保证 + WAL 归档）
  # ---------------------------------------------------------------------------
  postgres-prod-data:
    name: agentos_prod_postgres_data        # PostgreSQL 数据目录（含 WAL）
    driver: local
    # 可选：绑定挂载到独立磁盘（提高 I/O 性能）
    # driver_opts:
    #   type: none
    #   o: bind
    #   device: /data/hdd/agentos/postgres

  redis-prod-data:
    name: agentos_prod_redis_data           # Redis AOF 持久化数据
    driver: local
    # 可选：绑定挂载到高性能 NVMe SSD（Redis I/O 密集）
    # driver_opts:
    #   type: none
    #   o: bind
    #   device: /data/nvme/agentos/redis

  # ---------------------------------------------------------------------------
  # 应用数据
  # ---------------------------------------------------------------------------
  openlab-prod-data:
    name: agentos_prod_openlab_data         # OpenLab 用户数据/配置
    driver: local

  openlab-ssl-certs:
    name: agentos_prod_openlab_ssl          # SSL/TLS 证书（Let's Encrypt）
    driver: local

  # ---------------------------------------------------------------------------
  # 监控数据（时序数据库 - 高频写入）
  # ---------------------------------------------------------------------------
  prometheus-prod-data:
    name: agentos_prod_prometheus_tsdb      # Prometheus TSDB（30天数据 ~20GB）
    driver: local
    # 可选：绑定挂载到大容量 HDD
    # driver_opts:
    #   type: none
    #   o: bind
    #   device: /data/hdd/agentos/prometheus

  grafana-prod-data:
    name: agentos_prod_grafana_data         # Grafana 仪表盘/用户配置/SQLite DB
    driver: local
