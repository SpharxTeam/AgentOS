name: AgentOS Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'  # 每日凌晨 2 点运行

jobs:
  python-tests:
    name: Python Tests (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt
          pip install -r tests/requirements-dev.txt

      - name: Run linters
        run: |
          cd tests
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          black --check .

      - name: Run unit tests
        run: |
          cd tests
          pytest unit/ -v --tb=short --cov=agentos --cov-report=xml

      - name: Run integration tests
        run: |
          cd tests
          pytest integration/ -v --tb=short

      - name: Run security tests
        run: |
          cd tests
          pytest security/ -v --tb=short

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: tests/coverage.xml
          flags: python-tests
          name: codecov-umbrella
          fail_ci_if_error: true

  c-tests:
    name: C/C++ Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc g++ libcmockery2-dev

      - name: Configure CMake
        run: |
          cd agentos
          mkdir -p build && cd build
          cmake -DBUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Debug ..

      - name: Build
        run: |
          cd agentos/build
          make -j$(nproc)

      - name: Run CTests
        run: |
          cd agentos/build
          ctest --output-on-failure -V

  quality-report:
    name: Quality Report
    runs-on: ubuntu-latest
    needs: [python-tests, c-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r tests/requirements.txt

      - name: Generate quality report
        run: |
          cd tests
          python utils/test_quality_reporter.py

      - name: Upload quality report
        uses: actions/upload-artifact@v4
        with:
          name: quality-report
          path: tests/quality_report.txt

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [python-tests, c-tests]
    if: github.event_name == 'push' || github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r tests/requirements.txt
          pip install -r tests/requirements-dev.txt

      - name: Run E2E tests
        run: |
          cd tests
          pytest e2e/ -v --tb=short
