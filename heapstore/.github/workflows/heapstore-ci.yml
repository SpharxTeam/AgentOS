name: AgentOS heapstore CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'AgentOS/heapstore/**'
      - '.github/workflows/heapstore-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'AgentOS/heapstore/**'

jobs:
  build-windows-msvc:
    name: Windows MSVC Build
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake
      run: |
        cd AgentOS/heapstore
        cmake -B build -G "Visual Studio 17 2022" -A x64

    - name: Build
      run: |
        cd AgentOS/heapstore
        cmake --build build --config Release

    - name: Run Tests
      run: |
        cd AgentOS/heapstore
        ctest --test-dir build --output-on-failure -C Release
      env:
        BUILD_TESTS: ON

  build-linux-gcc:
    name: Linux GCC Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake gcc g++ libsqlite3-dev pthread-stubs0-dev

    - name: Configure CMake
      run: |
        cd AgentOS/heapstore
        cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: |
        cd AgentOS/heapstore
        cmake --build build --config Release -- -j$(nproc)

    - name: Run Tests
      run: |
        cd AgentOS/heapstore
        ctest --test-dir build --output-on-failure
      env:
        BUILD_TESTS: ON

  build-macos-clang:
    name: macOS Clang Build
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        brew install cmake sqlite3

    - name: Configure CMake
      run: |
        cd AgentOS/heapstore
        cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: |
        cd AgentOS/heapstore
        cmake --build build --config Release -- -j$(sysctl -n hw.ncpu)

    - name: Run Tests
      run: |
        cd AgentOS/heapstore
        ctest --test-dir build --output-on-failure
      env:
        BUILD_TESTS: ON

  code-quality-checks:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Check SPDX Headers
      run: |
        echo "Checking SPDX license headers..."
        find AgentOS/heapstore/src -name "*.c" -o -name "*.h" | while read file; do
          if ! grep -q "SPDX-FileCopyrightText" "$file"; then
            echo "❌ Missing SPDX header: $file"
            exit 1
          fi
          if ! grep -q "SPDX-License-Identifier" "$file"; then
            echo "❌ Missing SPDX identifier: $file"
            exit 1
          fi
        done
        echo "✅ All files have proper SPDX headers"

    - name: Check Function Documentation
      run: |
        echo "Checking Doxygen documentation coverage..."
        missing_docs=0
        for file in $(find AgentOS/heapstore/include -name "*.h"); do
          count=$(grep -c "^/\*\*$" "$file" || true)
          func_count=$(grep -c "^heapstore_error_t\|^bool\|^void\|^size_t" "$file" || true)
          if [ "$func_count" -gt 0 ] && [ "$count" -lt "$func_count" ]; then
            echo "⚠️  $file may have undocumented functions"
            missing_docs=$((missing_docs + 1))
          fi
        done
        if [ "$missing_docs" -gt 0 ]; then
          echo "⚠️  Found $missing_docs files with potential documentation gaps"
        else
          echo "✅ Documentation looks good"
        fi

    - name: Check Naming Conventions
      run: |
        echo "Checking naming conventions (snake_case)..."
        violations=0
        for file in $(find AgentOS/heapstore/src -name "*.c"); do
          if grep -E "^(void|int|uint64_t|size_t|bool|char)\s+[a-z]+[A-Z]" "$file" > /dev/null 2>&1; then
            echo "⚠️  CamelCase detected in $file"
            violations=$((violations + 1))
          fi
        done
        if [ "$violations" -gt 0 ]; then
          echo "⚠️  Found $violations potential naming convention violations"
        else
          echo "✅ Naming conventions look good"
        fi

  static-analysis:
    name: Static Analysis (cppcheck)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - uses: actions/checkout@v4

    - name: Install cppcheck
      run: sudo apt-get install -y cppcheck

    - name: Run cppcheck
      run: |
        cppcheck \
          --enable=all \
          --suppress=missingIncludeSystem \
          --std=c11 \
          --quiet \
          --error-exitcode=1 \
          AgentOS/heapstore/src \
          AgentOS/heapstore/include
      continue-on-error: true

  memory-sanitizer:
    name: Memory Sanitizer (AddressSanitizer)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake gcc g++ libsqlite3-dev

    - name: Configure with Sanitizers
      run: |
        cd AgentOS/heapstore
        cmake -B build-asan \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_C_FLAGS="-fsanitize=address -fno-omit-frame-pointer -g" \
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address"

    - name: Build with ASan
      run: |
        cd AgentOS/heapstore
        cmake --build build-asan --config Debug

    - name: Run Tests with ASan
      run: |
        cd AgentOS/heapstore
        ctest --test-dir build-asan --output-on-failure
      env:
        BUILD_TESTS: ON
      continue-on-error: true
