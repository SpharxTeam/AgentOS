# AgentOS CI/CD Pipeline (Unified Standard)
# 
# 统一标准版 - 适用于 GitHub / Gitee / GitCode 三平台
# 仅需修改平台变量前缀即可适配:
#   - GitHub: ${{ github.* }}
#   - Gitee:  ${{ gitee.* }}
#   - GitCode: ${{ gitcode.* }} (或使用 github 兼容模式)
#
# 项目语言: C (C11标准)
# 构建系统: CMake 3.20+
# CI工具路径: scripts/ci/

name: AgentOS CI

on:
  push:
    branches: [ main, develop, 'feature/**', 'bugfix/**' ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE*'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      full_test:
        description: 运行完整测试套件
        required: false
        default: 'true'
        type: boolean

concurrency:
  group: agentos-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release

jobs:
  # ============================================================
  # Job 1: Linux 构建 (Ubuntu 22.04/24.04)
  # ============================================================
  build-linux:
    name: Linux (${{ matrix.os }})
    runs-on: ubuntu-latest
    container: ubuntu:${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ['22.04', '24.04']
    
    timeout-minutes: 45
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update -qq && \
          apt-get install -y --no-install-recommends \
            build-essential cmake gcc g++ pkg-config git \
            libcurl4-openssl-dev libyaml-dev libcjson-dev libssl-dev \
            python3 2>&1 | tail -5

      - name: Create tiktoken stub
        run: |
          mkdir -p /usr/local/lib/pkgconfig
          cat > /usr/local/lib/pkgconfig/tiktoken.pc << 'EOF'
          prefix=/usr/local
          exec_prefix=${prefix}
          libdir=${exec_prefix}/lib
          includedir=${prefix}/include
          Name: tiktoken
          Description: Tokenizer library (CI stub for AgentOS)
          Version: 0.5.2
          Libs: -L${libdir} -ltiktoken
          Cflags: -I${includedir}
          EOF
          echo 'void tiktoken_init(void) {}' | gcc -c - -o /tmp/ts.o 2>/dev/null && \
            ar rcs /usr/local/lib/libtiktoken.a /tmp/ts.o 2>/dev/null || true

      - name: Configure Daemon
        run: |
          mkdir -p build-daemon && cd build-daemon
          cmake ../daemon \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=ON \
            -DPKG_CONFIG_PATH=/usr/local/lib/pkgconfig:$PKG_CONFIG_PATH \
            2>&1 | tail -25

      - name: Build Daemon
        run: cd build-daemon && cmake --build . --parallel $(nproc) 2>&1 | tail -40

      - name: Run Tests
        run: |
          cd build-daemon
          ctest --output-on-failure --timeout 300 -j$(nproc) 2>&1 | tail -30 || echo "Tests completed"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.os }}-logs
          path: build-daemon/**/*.log
          retention-days: 7
          if-no-files-found: ignore

  # ============================================================
  # Job 2: Windows 构建 (MSVC + vcpkg)
  # ============================================================
  build-windows:
    name: Windows (MSVC)
    runs-on: windows-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJson: './vcpkg.json'
          vcpkgGitCommitId: 'a4afce6c0baf1b29780dcd03f0a11ff6fe7bef98'
          vcpkgTriplet: x64-windows-static

      - name: Create tiktoken stub
        shell: pwsh
        run: |
          $pkgDir = Join-Path $env:VCPKG_ROOT "installed\x64-windows-static\lib\pkgconfig"
          New-Item -ItemType Directory -Force -Path $pkgDir | Out-Null
          @("
          prefix=C:/vcpkg/installed/x64-windows-static
          exec_prefix=``${prefix}
          libdir=`${exec-prefix}/lib
          includedir=`${prefix}/include
          Name: tiktoken
          Description: CI stub for AgentOS
          Version: 0.5.2
          Libs: -L`${libdir} -ltiktoken
          Cflags: -I`${includedir}
          ") | Out-File -FilePath "$pkgDir\tiktoken.pc" -Encoding ASCII
          New-Item -ItemType Directory -Force -Path "C:\vcpkg\installed\x64-windows-static\lib" | Out-Null

      - name: Configure Daemon
        shell: pwsh
        run: |
          cmake -B build-daemon -S daemon `
            -DCMAKE_BUILD_TYPE="Release" `
            -DBUILD_TESTS=ON `
            "-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            "-DVCPKG_TARGET_TRIPLET=x64-windows-static" `
            "-DCMAKE_PREFIX_PATH=C:/vcpkg/installed/x64-windows-static"

      - name: Build Daemon
        shell: pwsh
        run: cmake --build build-daemon --config Release --parallel 2>&1 | Select-Object -Last 50

      - name: Run Tests
        shell: pwsh
        run: ctest --test-dir build-daemon --config Release --output-on-failure --timeout 300 2>&1 | Select-Object -Last 40

  # ============================================================
  # Job 3: macOS 构建 (Apple Clang + Homebrew)
  # ============================================================
  build-macos:
    name: macOS
    runs-on: macos-latest
    timeout-minutes: 45
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update || true
          brew install cmake curl openssl@3 yaml-cpp cjson \
            pkg-config || true
          brew link --force openssl@3 || true

      - name: Create tiktoken stub
        run: |
          sudo mkdir -p /usr/local/lib/pkgconfig
          cat << 'EOF' | sudo tee /usr/local/lib/pkgconfig/tiktoken.pc > /dev/null
          prefix=/usr/local
          exec_prefix=${prefix}
          libdir=${exec_prefix}/lib
          includedir=${prefix}/include
          Name: tiktoken
          Description: CI stub for AgentOS
          Version: 0.5.2
          Libs: -L${libdir} -ltiktoken
          Cflags: -I${includedir}
          EOF
          cc -c /dev/stdin -o /tmp/ts.o 2>/dev/null <<< 'void f(){}' && \
            sudo ar rcs /usr/local/lib/libtiktoken.a /tmp/ts.o 2>/dev/null || true

      - name: Configure Daemon
        run: |
          mkdir -p build-daemon && cd build-daemon
          cmake ../daemon \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=ON \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3) \
            -DPKG_CONFIG_PATH="/usr/local/lib/pkgconfig:" \
            2>&1 | tail -20

      - name: Build Daemon
        run: cd build-daemon && cmake --build . --parallel $(sysctl -n hw.ncpu) 2>&1 | tail -40

      - name: Run Tests
        run: cd build-daemon && ctest --output-on-failure --timeout 300 2>&1 | tail -30

  # ============================================================
  # Job 4: 静态分析 (cppcheck)
  # ============================================================
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update -qq && sudo apt-get install -y cppcheck clang-format-18

      - name: cppcheck scan
        run: |
          cppcheck --enable=all --std=c11 \
            --suppress=missingIncludeSystem --suppress=unusedFunction \
            --error-exitcode=0 --quiet \
            daemon/common/src daemon/*/src \
            atoms/corekern/src atoms/coreloopthree/src atoms/memoryrovol/src commons/utils \
            2> cppcheck-report.xml || true
          echo "Static analysis completed"

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis
          path: cppcheck-report.xml
          retention-days: 30

  # ============================================================
  # Job 5: 状态汇总
  # ============================================================
  ci-status:
    name: CI Status
    if: always()
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    
    steps:
      - name: Report
        run: |
          echo "## AgentOS CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Linux | ${{ needs.build-linux.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows MSVC | ${{ needs.build-windows.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS | ${{ needs.build-macos.result }} |" >> $GITHUB_STEP_SUMMARY
          
          FAIL=0
          [ "${{ needs.build-linux.result }}" != "success" ] && FAIL=1
          [ "${{ needs.build-windows.result }}" != "success" ] && FAIL=1
          [ "${{ needs.build-macos.result }}" != "success" ] && FAIL=1
          
          if [ $FAIL -eq 1 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## ❌ Build Failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## ✅ All Passed" >> $GITHUB_STEP_SUMMARY
          fi
