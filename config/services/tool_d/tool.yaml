# 工具服务配置

# 内置工具定义
tools:
  - name: echo
    executable: /bin/echo
    params:
      - message
    timeout_sec: 5
    cacheable: 1
    permission_rule: "allow_all"

  - name: date
    executable: /bin/date
    timeout_sec: 5
    cacheable: 0
    permission_rule: "allow_all"

# 缓存配置
cache_capacity: 100
cache_ttl_sec: 300

# 执行器配置
executor_workers: 4
workbench_type: process
container_image: alpine:latest  # 若使用容器