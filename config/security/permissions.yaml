# 默认权限规则

permissions:
  # 文件系统权限
  - resource: "file:read:/tmp/*"
    action: "read"
    default: "allow"
  - resource: "file:write:/tmp/agentos/*"
    action: "write"
    default: "allow"
  - resource: "file:write:/etc/*"
    action: "write"
    default: "deny"
  - resource: "file:delete:/*"
    action: "delete"
    default: "deny"

  # 网络权限
  - resource: "network:outbound:api.openai.com:443"
    action: "connect"
    default: "allow"
  - resource: "network:outbound:*:80"
    action: "connect"
    default: "deny"
  - resource: "network:outbound:*:443"
    action: "connect"
    default: "allow"   # 允许HTTPS

  # 代码执行
  - resource: "code:execute:python"
    action: "run"
    default: "allow_with_sandbox"
  - resource: "code:execute:javascript"
    action: "run"
    default: "allow_with_sandbox"

  # 环境变量访问
  - resource: "env:read:OPENAI_API_KEY"
    action: "read"
    default: "allow"
  - resource: "env:read:*"
    action: "read"
    default: "deny"