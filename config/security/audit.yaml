# 审计规则

audit:
  # 记录所有敏感操作
  sensitive_actions:
    - "file:delete"
    - "file:write:/etc/*"
    - "network:outbound:*"
    - "code:execute:*"
    - "env:read:*"

  # 审计日志保留天数
  retention_days: 90

  # 告警阈值
  alerts:
    - condition: "failed_permission > 10"
      severity: warning
    - condition: "suspicious_pattern_detected"
      severity: critical