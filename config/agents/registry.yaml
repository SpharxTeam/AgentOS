# 内置 Agent 注册列表

agents:
  - agent_id: "product_manager_v1"
    role: "product_manager"
    source: "builtin"
    version: "1.0.0"
    enabled: true
    # 默认信任分数（0-1）
    trust_score: 0.9
    # 契约文件路径（相对 agentos_open/contrib/agents）
    contract_path: "openhub/contrib/agents/product_manager/contract.json"
    # 默认模型偏好
    preferred_model: "gpt-4-turbo"

  - agent_id: "architect_v1"
