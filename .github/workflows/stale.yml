name: Close Stale Issues and PRs

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Close Stale Items
    runs-on: ubuntu-latest

    steps:
      - name: Close stale issues and PRs
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issues: stale after 30 days, close 7 days later
          days-before-issue-stale: 30
          days-before-issue-close: 7
          stale-issue-label: 'stale'
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had recent activity.
            It will be closed if no further activity occurs. Reply to keep it open.

          # PRs: stale after 60 days, close 14 days later
          days-before-pr-stale: 60
          days-before-pr-close: 14
          stale-pr-label: 'stale'
          stale-pr-message: |
            This PR has been automatically marked as stale because it has not had recent activity.
            It will be closed if no further activity occurs. Push new commits or reply to keep it open.

          # Exempt labels
          exempt-issue-labels: 'pinned,security,good first issue'
          exempt-pr-labels: 'pinned,security'

          remove-stale-when-updated: true
          ascending: false
          operations-per-run: 100
