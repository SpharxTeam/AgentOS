# AgentOS Engineering Quality Gate
#
# Purpose: Automated code quality checks on PRs and pushes
# Last updated: 2026-04-26

name: Quality Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # Code metrics: LOC, file count, anti-pattern tracking
  code-metrics:
    name: Code Metrics
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Calculate metrics
        run: |
          echo "## Code Metrics Report" >> $GITHUB_STEP_SUMMARY

          TOTAL_LOC=$(find agentos \( -name '*.c' -o -name '*.h' \) -type f 2>/dev/null | xargs wc -l 2>/dev/null | tail -1 | awk '{print $1}')
          TOTAL_FILES=$(find agentos \( -name '*.c' -o -name '*.h' \) -type f 2>/dev/null | wc -l)

          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| C Source Files | ${TOTAL_FILES:-0} |" >> $GITHUB_STEP_SUMMARY
          echo "| C Lines of Code | ${TOTAL_LOC:-0} |" >> $GITHUB_STEP_SUMMARY
