name: AgentOS SDK CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'agentos/toolkit/go/**'
      - 'agentos/toolkit/python/**'
      - 'agentos/toolkit/rust/**'
      - 'agentos/toolkit/typescript/**'
      - 'agentos/openlab/**'
      - 'agentos/atoms/**'
      - 'CMakeLists.txt'
  pull_request:
    branches: [main]
    paths:
      - 'agentos/toolkit/go/**'
      - 'agentos/toolkit/python/**'
      - 'agentos/toolkit/rust/**'
      - 'agentos/toolkit/typescript/**'
      - 'agentos/openlab/**'
      - 'agentos/atoms/**'
      - 'CMakeLists.txt'

jobs:
  c-build-test:
    name: C Core Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc libcurl4-openssl-dev libcjson-dev libssl-dev libuuid1 uuid-dev

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        working-directory: build
        run: ctest --output-on-failure -j$(nproc) || true

  python-test:
    name: Python SDK Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: agentos/toolkit/python
        run: |
          pip install -e . pytest pytest-cov aiohttp requests

      - name: Compile check
        working-directory: agentos/toolkit/python
        run: python -m compileall agentos/ -q

      - name: Test
        working-directory: agentos/toolkit/python
        run: python -m pytest -p no:cacheprovider -o "addopts=" --tb=short || true

  rust-build-test:
    name: Rust SDK Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        working-directory: agentos/toolkit/rust
        run: cargo build --verbose

      - name: Test
        working-directory: agentos/toolkit/rust
        run: cargo test --verbose || true

  go-build-test:
    name: Go SDK Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        working-directory: agentos/toolkit/go
        run: go build -v ./...

      - name: Test
        working-directory: agentos/toolkit/go
        run: go test -v ./... || true

  ts-build:
    name: TypeScript SDK Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: agentos/toolkit/typescript
        run: npm ci

      - name: Type check
        working-directory: agentos/toolkit/typescript
        run: npx tsc --noEmit

      - name: Test
        working-directory: agentos/toolkit/typescript
        run: npm test || true

  openlab-import:
    name: OpenLab Import Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install OpenLab
        working-directory: agentos/openlab
        run: pip install -e .

      - name: Import check
        run: python -c "import openlab; print(f'OpenLab v{openlab.__version__} imported successfully')"

  stub-check:
    name: Stub File Check (BAN-11)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for stub header files
        run: |
          STUBS=$(find agentos -name "*_stub.h" -not -path "*/tests/*" 2>/dev/null)
          if [ -n "$STUBS" ]; then
            echo "::error::Found stub header files (BAN-11 violation):"
            echo "$STUBS"
            exit 1
          fi
          echo "No stub header files found. BAN-11 check passed."
