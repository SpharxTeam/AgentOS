name: Documentation Check

on:
  push:
    paths:
      - '**/*.md'
  pull_request:
    paths:
      - '**/*.md'

permissions:
  contents: read

jobs:
  check-broken-links:
    name: Check Broken Links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Markdown links
        run: |
          echo "## Documentation Link Check" >> $GITHUB_STEP_SUMMARY

          BROKEN=0
          find . -name "*.md" -not -path "./.git/*" | while read -r file; do
            grep -oP '\]\([^)]+\)' "$file" | sed 's/\]\(([^#)]*)\)#.*/\1/' | sed 's/\]\((.*)\)/\1/' | while read -r link; do
              # Skip external links
              if [[ "$link" == http* ]]; then
                continue
              fi

              # Resolve relative path
              target_file="$(dirname "$file")/$link"
              target_file=$(realpath -m "$target_file" 2>/dev/null || echo "$target_file")

              if [ ! -f "$target_file" ]; then
                echo "  Broken link in $file: $link"
                BROKEN=$((BROKEN + 1))
              fi
            done
          done

          if [ "$BROKEN" -gt 0 ]; then
            echo "Found $BROKEN broken links"
          else
            echo "All links valid"
          fi
