name: Dependency Update

on:
  schedule:
    # 每周一凌晨 3 点运行
    - cron: '0 3 * * 1'
  workflow_dispatch:
    inputs:
      update_type:
        description: 'Update type'
        required: false
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'major'
          - 'minor'
          - 'patch'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  check-dependencies:
    name: Check for Outdated Dependencies
    runs-on: ubuntu-latest
    
    outputs:
      has_updates: ${{ steps.check.outputs.has_updates }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-tools
        run: pip install pip-compile pip-upgrade

      - name: Check C/C++ dependencies (vcpkg)
        id: check
        run: |
          echo "📦 Checking vcpkg dependencies..."
          
          # 检查是否有可更新的依赖
          UPDATES_AVAILABLE=0
          
          if [ -f "vcpkg.json" ]; then
            echo "Found vcpkg.json"
            # 这里可以添加实际的版本检查逻辑
            # 例如使用 vcpkg x-update-baseline 命令
            
            # 示例：检查特定包的版本
            echo "Checking package versions..."
            
            # 设置输出变量（示例）
            echo "has_updates=true" >> $GITHUB_OUTPUT
            UPDATES_AVAILABLE=1
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
          fi
          
          echo "Updates available: $UPDATES_AVAILABLE"

      - name: Create issue if updates available
        if: steps.check.outputs.has_updates == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['dependencies', 'automated']
            });
            
            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '📦 Dependency Updates Available',
                body: `## Summary\n\nAutomated dependency check found packages that can be updated.\n\n## Details\n\nRun \`.github/workflows/dependency-update.yml\` manually or wait for next scheduled run.\n\n---\n\n*This issue was created automatically by GitHub Actions.*`,
                labels: ['dependencies', 'automated', 'maintenance']
              });
            }

  update-cpp-dependencies:
    name: Update C/C++ Dependencies
    needs: check-dependencies
    if: needs.check-dependencies.outputs.has_updates == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJson: './vcpkg.json'

      - name: Update baseline
        run: |
          if [ -f "vcpkg.json" ]; then
            # 备份原始文件
            cp vcpkg.json vcpkg.json.backup
            
            # 更新基线
            vcpkg x-update-baseline || true
            
            # 检查是否有变化
            if ! diff -q vcpkg.json vcpkg.json.backup > /dev/null; then
              echo "Dependencies have been updated"
              
              # 创建分支并提交
              BRANCH="deps/update-$(date +%Y%m%d)"
              git checkout -b "$BRANCH"
              git add vcpkg.json
              git commit -m "chore(deps): update vcpkg dependencies $(date +%Y-%m-%d)"
              git push origin "$BRANCH" --force-with-lease
              
              # 输出分支名称供后续步骤使用
              echo "branch_name=$BRANCH" >> $GITHUB_ENV
            else
              echo "No dependency changes detected"
              rm vcpkg.json.backup
            fi
          fi

      - name: Create Pull Request
        if: env.branch_name != ''
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ env.branch_name }}
          base: main
          title: 'chore(deps): Update C/C++ Dependencies'
          body: |
            ## Summary
            
            Automated dependency update for C/C++ packages managed by vcpkg.
            
            ## Changes
            
            This PR updates the following dependencies (details in `vcpkg.json`):
            
            - Updated vcpkg baseline to latest compatible versions
            
            ## Testing Instructions
            
            ```bash
            mkdir build && cd build
            cmake .. -DCMAKE_TOOLCHAIN_FILE=[vcpkg root]/scripts/buildsystems/vcpkg.cmake
            cmake --build .
            ctest --output-on-failure
            ```
            
            ## Checklist
            
            - [ ] All tests pass
            - [ ] Build succeeds on all platforms
            - [ ] No breaking changes introduced
            
            ---
            
            *This PR was created automatically by GitHub Actions.*
          labels: dependencies, automated, maintenance
          reviewers: lidecheng, wangliren

  cleanup-old-issues:
    name: Cleanup Old Dependency Issues
    needs: check-dependencies
    if: always()
    runs-on: ubuntu-latest
    
    steps:
      - name: Close stale dependency issues
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['dependencies', 'automated'],
              per_page: 20
            });
            
            const STALE_DAYS = 30;
            const now = new Date();
            
            for (const issue of issues) {
              const createdAt = new Date(issue.created_at);
              const daysSinceCreation = Math.floor((now - createdAt) / (1000 * 60 * 60 * 24));
              
              if (daysSinceCreation > STALE_DAYS) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `This automated issue is being closed after ${daysSinceCreation} days of inactivity.\n\nA new issue will be created automatically when dependencies need updating again.`
                });
                
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed'
                });
              }
            }

  notify-maintainers:
    name: Notify Maintainers
    needs: [update-cpp-dependencies]
    if: always() && needs.update-cpp-dependencies.result == 'success'
    runs-on: ubuntu-latest
    
    steps:
      - name: Send notification
        run: |
          echo "✅ Dependency update process completed successfully"
          echo ""
          echo "Next steps:"
          echo "1. Review the created PR"
          echo "2. Run tests to ensure compatibility"
          echo "3. Merge if all checks pass"
          echo ""
          echo "Maintainers will be notified automatically."
