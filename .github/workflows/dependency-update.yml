name: Dependency Update

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:
    inputs:
      update_type:
        description: 'Update type'
        required: false
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'security'
          - 'patch'
      dry_run:
        description: 'Dry run - check only, no actual updates'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

env:
  DRY_RUN: ${{ github.event.inputs.dry_run || false }}
  UPDATE_TYPE: ${{ github.event.inputs.update_type || 'all' }}

jobs:
  dependency-health-check:
    name: Dependency Health Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Python dependencies
        run: |
          echo "## Dependency Health Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          for f in requirements.txt pyproject.toml setup.py; do
            if [ -f "$f" ]; then
              echo "### Python ($f)" >> $GITHUB_STEP_SUMMARY
              echo "Found: $f" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Check Go dependencies
        run: |
          if [ -f "go.mod" ]; then
            echo "### Go (go.mod)" >> $GITHUB_STEP_SUMMARY
            echo "Found: go.mod" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check Rust dependencies
        run: |
          if [ -f "Cargo.toml" ]; then
            echo "### Rust (Cargo.toml)" >> $GITHUB_STEP_SUMMARY
            echo "Found: Cargo.toml" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check TypeScript dependencies
        run: |
          if [ -f "package.json" ]; then
            echo "### TypeScript (package.json)" >> $GITHUB_STEP_SUMMARY
            echo "Found: package.json" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
