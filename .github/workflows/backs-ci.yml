name: backs CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backs/**'
      - '.github/workflows/backs-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'backs/**'
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  BACKS_VERSION: 1.0.0

jobs:
  # ============================================================================
  # 代码质量检查
  # ============================================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install static analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck clang-format clang-tidy

      - name: C Code Analysis (cppcheck)
        working-directory: backs
        run: |
          cppcheck --enable=all --std=c11 --platform=unix64 \
            --inline-suppr --suppress=missingIncludeSystem \
            -j$(nproc) common/ llm_d/ tool_d/ monit_d/ sched_d/ market_d/ 2>&1 | tee cppcheck_report.txt

      - name: Check code formatting (clang-format)
        working-directory: backs
        run: |
          if command -v clang-format &> /dev/null; then
            find common llm_d tool_d monit_d sched_d market_d \
              \( -name '*.c' -o -name '*.h' \) \
              -exec clang-format --dry-run --Werror {} \; 2>&1 || true
          fi

      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backs-code-quality-reports
          path: backs/cppcheck_report.txt

  # ============================================================================
  # 安全扫描
  # ============================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Bandit (Python-style checks)
        run: |
          pip install bandit 2>/dev/null || true
          bandit -r backs/ --severity-level=medium --confidence-level=medium \
            -f json -o bandit_report.json 2>/dev/null || true

      - name: Secrets scanning (trufflehog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
        continue-on-error: true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backs-security-reports
          path: |
            backs/bandit_report.json

  # ============================================================================
  # 构建 backs-common 公共库
  # ============================================================================
  build-common:
    name: Build backs-common
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        cc: [ gcc ]
        include:
          - os: ubuntu-latest
            cc: clang
          - os: macos-latest
            cc: clang
        exclude:
          - os: windows-latest
            cc: gcc
          - os: windows-latest
            cc: clang

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config
          sudo apt-get install -y libyaml-dev libcjson-dev libcurl4-openssl-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja yaml-cjson libcjson curl
        env:
          CC: ${{ matrix.cc }}

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake ninja --yes
        shell: pwsh

      - name: Configure CMake
        working-directory: backs/common
        run: |
          mkdir -p build
          cd build
          cmake .. -G "Ninja" \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBUILD_TESTS=ON \
            -DCMAKE_C_COMPILER=${{ matrix.cc }}

      - name: Build
        working-directory: backs/common/build
        run: ninja

      - name: Run unit tests
        working-directory: backs/common/build
        run: |
          ctest --output-on-failure -j$(nproc) || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backs-common-build-${{ matrix.os }}-${{ matrix.cc }}
          path: |
            backs/common/build/*.a
            backs/common/build/*.lib
            backs/common/build/*.dll
            backs/common/build/*.so*
          retention-days: 7

  # ============================================================================
  # 构建 llm_d 服务
  # ============================================================================
  build-llm_d:
    name: Build llm_d
    runs-on: ${{ matrix.os }}
    needs: build-common
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config
          sudo apt-get install -y libyaml-dev libcjson-dev libcurl4-openssl-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja yaml-cjson libcjson curl

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake ninja --yes
        shell: pwsh

      - name: Download common artifacts
        uses: actions/download-artifact@v4
        with:
          name: backs-common-build-${{ matrix.os }}-gcc
          path: backs/common/build
        continue-on-error: true

      - name: Configure CMake
        working-directory: backs/llm_d
        run: |
          mkdir -p build
          cd build
          cmake .. -G "Ninja" \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBUILD_TESTS=ON \
            -DCOMMON_LIB_PATH=../common/build

      - name: Build
        working-directory: backs/llm_d/build
        run: ninja

      - name: Run unit tests
        working-directory: backs/llm_d/build
        run: |
          ctest --output-on-failure -j$(nproc) || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backs-llm_d-build-${{ matrix.os }}
          path: |
            backs/llm_d/build/agentos-llm-d
            backs/llm_d/build/*.a
            backs/llm_d/build/*.lib
            backs/llm_d/build/*.dll
          retention-days: 7

  # ============================================================================
  # 构建 tool_d 服务
