      - name: Build
        working-directory: backs/tool_d/build
        run: ninja

      - name: Run unit tests
        working-directory: backs/tool_d/build
        run: |
          ctest --output-on-failure -j$(nproc) || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backs-tool_d-build-${{ matrix.os }}
          path: |
            backs/tool_d/build/agentos-tool-d
            backs/tool_d/build/*.a
            backs/tool_d/build/*.lib
            backs/tool_d/build/*.dll
          retention-days: 7

  # ============================================================================
  # 构建 monit_d 服务
  # ============================================================================
  build-monit_d:
