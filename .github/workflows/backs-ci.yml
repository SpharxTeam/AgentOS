            backs/market_d/build/*.a
            backs/market_d/build/*.lib
            backs/market_d/build/*.dll
          retention-days: 7

  # ============================================================================
  # 代码覆盖率报告
  # ============================================================================
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake gcc clang
          sudo apt-get install -y lcov gcovr
          sudo apt-get install -y libyaml-dev libcjson-dev libcurl4-openssl-dev

      - name: Configure with coverage (common)
        working-directory: backs/common
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTS=ON \
            -DCMAKE_C_FLAGS="--coverage -fprofile-arcs -ftest-coverage"

      - name: Build and test (common)
        working-directory: backs/common/build
        run: |
          cmake --build . -j$(nproc)
          ctest --output-on-failure || true

      - name: Generate coverage report
        working-directory: backs/common/build
        run: |
          lcov --capture --directory . --output-file coverage.info
          lcov --remove coverage.info '*/tests/*' '*/build/*' --output-file coverage.filtered.info
          genhtml coverage.filtered.info --output-directory coverage_report

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backs-coverage-report
          path: backs/common/build/coverage_report

  # ============================================================================
  # 包发布
  # ============================================================================
  package:
    name: Create Release Package
    needs: [ build-common, build-llm_d, build-tool_d, build-monit_d, build-sched_d, build-market_d ]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create package directory
        run: |
          mkdir -p backs-${{ env.BACKS_VERSION }}
          cp -r artifacts/* backs-${{ env.BACKS_VERSION }}/

      - name: Create distribution packages
        run: |
          cd backs-${{ env.BACKS_VERSION }}
          tar -czvf ../backs-${{ env.BACKS_VERSION }}-linux-x86_64.tar.gz .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: backs-${{ env.BACKS_VERSION }}-linux-x86_64.tar.gz
          draft: true

  # ============================================================================
  # 质量门禁
  # ============================================================================
  quality-gate:
    name: Quality Gates
    runs-on: ubuntu-latest
    needs: [ code-quality, security-scan, build-common, build-llm_d, build-tool_d, build-monit_d, build-sched_d, build-market_d ]
    
    steps:
      - name: Check build results
        run: |
          echo "=========================================="
          echo "     AgentOS Backs CI/CD Quality Gate"
          echo "=========================================="
          echo ""
          echo "Job Results:"
          echo "  Code Quality:     ${{ needs.code-quality.result }}"
          echo "  Security Scan:    ${{ needs.security-scan.result }}"
          echo "  Build Common:    ${{ needs.build-common.result }}"
          echo "  Build llm_d:     ${{ needs.build-llm_d.result }}"
          echo "  Build tool_d:    ${{ needs.build-tool_d.result }}"
          echo "  Build monit_d:   ${{ needs.build-monit_d.result }}"
          echo "  Build sched_d:    ${{ needs.build-sched_d.result }}"
          echo "  Build market_d:   ${{ needs.build-market_d.result }}"
          echo ""

          if [[ "${{ needs.code-quality.result }}" == "failure" ]] || \
             [[ "${{ needs.build-common.result }}" == "failure" ]] || \
             [[ "${{ needs.build-llm_d.result }}" == "failure" ]] || \
             [[ "${{ needs.build-tool_d.result }}" == "failure" ]] || \
             [[ "${{ needs.build-monit_d.result }}" == "failure" ]] || \
             [[ "${{ needs.build-sched_d.result }}" == "failure" ]] || \
             [[ "${{ needs.build-market_d.result }}" == "failure" ]]; then
            echo "❌ Quality gates FAILED"
            echo "   One or more critical jobs have failed."
            exit 1
          fi
          
          echo "✅ All quality gates PASSED"
          echo "   All builds successful, ready for deployment."

      - name: Success notification
        if: success()
        run: |
          echo "🎉 AgentOS backs module CI/CD completed successfully!"
