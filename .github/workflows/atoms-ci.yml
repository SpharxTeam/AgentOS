# AgentOS Atoms Module CI/CD Pipeline
# Version: 1.0.0
# 
# 本CI/CD流程遵循《工程控制论》的反馈闭环原则和《论系统工程》的层次分解原则
# 确保每个阶段都有完整的反馈机制和质量门禁

name: Atoms Module CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'atoms/**'
      - '.github/workflows/atoms-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'atoms/**'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'Release'
        type: choice
        options:
          - Debug
          - Release
          - RelWithDebInfo
      run_security_scan:
        description: 'Run security scan'
        required: false
        default: true
        type: boolean

env:
  BUILD_TYPE: ${{ github.event.inputs.build_type || 'Release' }}
  VERSION: 1.0.0.5
  CMAKE_VERSION: '3.20'
  CACHE_VERSION: v1

jobs:
  # ==========================================================================
  # 阶段0: 代码质量检查 (Quality Gate)
  # ==========================================================================
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install C static analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck clang-format clang-tidy
          
      - name: Cache analysis results
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/cppcheck
            ~/.cache/clang-tidy
          key: ${{ runner.os }}-analysis-${{ env.CACHE_VERSION }}-${{ hashFiles('atoms/**/*.c', 'atoms/**/*.h') }}
          restore-keys: |
            ${{ runner.os }}-analysis-${{ env.CACHE_VERSION }}-

      - name: Run cppcheck
        id: cppcheck
        run: |
          mkdir -p reports
          cppcheck --enable=all --std=c11 --platform=unix64 \
            --force --inline-suppr \
            --xml --xml-version=2 \
            --output-file=reports/cppcheck.xml \
            -j$(nproc) \
            atoms/ 2>&1 | tee reports/cppcheck.txt
          
          # 统计错误数量
          ERRORS=$(grep -c "<error " reports/cppcheck.xml || echo "0")
          echo "errors=$ERRORS" >> $GITHUB_OUTPUT
          
          if [ "$ERRORS" -gt 0 ]; then
            echo "::warning::cppcheck found $ERRORS issues"
          fi

      - name: Check code formatting
        id: format
        run: |
          find atoms -name "*.c" -o -name "*.h" | while read file; do
            clang-format --dry-run --Werror "$file" 2>&1 || true
          done | tee reports/format.txt || true
          
          if [ -s reports/format.txt ]; then
            echo "::warning::Some files need formatting"
          fi

      - name: Run clang-tidy
        id: clang-tidy
        run: |
          # 生成compile_commands.json
          mkdir -p atoms/build
          cd atoms
          cmake -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          cd ..
          
          # 运行clang-tidy
          find atoms -name "*.c" | head -20 | while read file; do
            clang-tidy -p atoms/build "$file" 2>&1 || true
          done | tee reports/clang-tidy.txt || true

      - name: Upload analysis reports
        uses: actions/upload-artifact@v4
        with:
          name: code-quality-reports
          path: reports/
          retention-days: 30

      - name: Quality gate check
        run: |
          echo "=== Code Quality Summary ==="
          echo "Cppcheck issues: ${{ steps.cppcheck.outputs.errors }}"
          
          # 如果有严重错误则失败
          if grep -q "error id=\".*\" severity=\"error\"" reports/cppcheck.xml 2>/dev/null; then
            echo "::error::Critical issues found by cppcheck"
            exit 1
          fi
          
          echo "✅ Code quality check passed"

  # ==========================================================================
  # 阶段1: 跨平台构建 (Build Matrix)
  # ==========================================================================
  build:
    name: Build ${{ matrix.module }} (${{ matrix.os }}, ${{ matrix.compiler }})
    runs-on: ${{ matrix.os }}
    needs: [code-quality]
    timeout-minutes: 30
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        module: [corekern, coreloopthree, memoryrovol, syscall, utils]
        compiler: [gcc, clang]
        include:
          # Windows MSVC构建
          - os: windows-latest
            module: corekern
            compiler: msvc
          - os: windows-latest
            module: coreloopthree
            compiler: msvc
          - os: windows-latest
            module: memoryrovol
            compiler: msvc
          - os: windows-latest
            module: syscall
            compiler: msvc
        exclude:
          # Windows不支持GCC/Clang（使用MSVC）
          - os: windows-latest
            compiler: gcc
          - os: windows-latest
            compiler: clang
          # macOS使用默认Clang
          - os: macos-latest
            compiler: gcc

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows' && matrix.compiler == 'msvc'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config \
            libyaml-dev libcjson-dev libcurl4-openssl-dev \
            libsqlite3-dev libssl-dev
          
          if [ "${{ matrix.compiler }}" == "clang" ]; then
            sudo apt-get install -y clang
          fi

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja yaml-cjson curl sqlite openssl
          
      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake ninja -y
          # vcpkg依赖安装
          # vcpkg install yaml-cjson curl sqlite3 openssl

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: |
            atoms/${{ matrix.module }}/build
            ~/.cache/ccache
          key: ${{ runner.os }}-${{ matrix.compiler }}-${{ matrix.module }}-${{ env.CACHE_VERSION }}-${{ hashFiles(format('atoms/{0}/**/CMakeLists.txt', matrix.module)) }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.compiler }}-${{ matrix.module }}-${{ env.CACHE_VERSION }}-

      - name: Configure CMake
        working-directory: atoms/${{ matrix.module }}
        run: |
          mkdir -p build
          cd build
          
          # 设置编译器
          if [ "${{ runner.os }}" == "Linux" ] && [ "${{ matrix.compiler }}" == "clang" ]; then
            export CC=clang
            export CXX=clang++
          elif [ "${{ runner.os }}" == "Linux" ] && [ "${{ matrix.compiler }}" == "gcc" ]; then
            export CC=gcc
            export CXX=g++
          fi
          
          cmake .. \
            -G "Ninja" \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBUILD_TESTS=ON \
            -DBUILD_EXAMPLES=OFF \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_C_FLAGS="-Wall -Wextra -Werror=return-type"
        shell: bash

      - name: Build
        working-directory: atoms/${{ matrix.module }}/build
        run: |
          ninja -j$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 4)
        shell: bash

      - name: Run unit tests
        working-directory: atoms/${{ matrix.module }}/build
        run: |
          ctest --output-on-failure --timeout 300 -j$(nproc 2>/dev/null || echo 4)
        shell: bash

      - name: Generate coverage report
        if: runner.os == 'Linux' && matrix.compiler == 'gcc'
        working-directory: atoms/${{ matrix.module }}/build
        run: |
          # 启用覆盖率编译选项
          cmake .. -DCMAKE_C_FLAGS="--coverage -fprofile-arcs -ftest-coverage"
          ninja clean
          ninja
          ctest --output-on-failure
          
          # 生成覆盖率报告
          gcovr -r .. --xml -o coverage.xml --html-details coverage.html
          
      - name: Upload coverage
        if: runner.os == 'Linux' && matrix.compiler == 'gcc'
        uses: codecov/codecov-action@v4
        with:
          files: atoms/${{ matrix.module }}/build/coverage.xml
          flags: ${{ matrix.module }}
          name: ${{ matrix.module }}-coverage

      - name: Package artifacts
        working-directory: atoms/${{ matrix.module }}/build
        run: |
          mkdir -p package/lib package/include
          
          # 复制静态库
          find . -name "*.a" -exec cp {} package/lib/ \; 2>/dev/null || true
          find . -name "*.lib" -exec cp {} package/lib/ \; 2>/dev/null || true
          
          # 复制头文件
          cp -r ../include/* package/include/ 2>/dev/null || true
          
          # 创建压缩包
          cd package
          tar -czvf ../${{ matrix.module }}-${{ env.VERSION }}-${{ runner.os }}-${{ matrix.compiler }}.tar.gz .
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: atoms-${{ matrix.module }}-${{ runner.os }}-${{ matrix.compiler }}
          path: atoms/${{ matrix.module }}/*.tar.gz
          retention-days: 7

  # ==========================================================================
  # 阶段2: 集成测试 (Integration Tests)
  # ==========================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 20
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: atoms-*-Linux-gcc

      - name: Setup test environment
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build
          
          # 解压所有模块
          mkdir -p test_env/lib test_env/include
          for pkg in artifacts/atoms-*-Linux-gcc/*.tar.gz; do
            tar -xzf "$pkg" -C test_env
          done

      - name: Build integration tests
        working-directory: atoms
        run: |
          mkdir -p build_integration
          cd build_integration
          cmake ../tests/integration \
            -G "Ninja" \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_LIBRARY_PATH="${{ github.workspace }}/test_env/lib" \
            -DCMAKE_INCLUDE_PATH="${{ github.workspace }}/test_env/include"
          ninja

      - name: Run integration tests
        working-directory: atoms/build_integration
        run: |
          ctest --output-on-failure --timeout 300

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: atoms/build_integration/Testing/
          retention-days: 30

  # ==========================================================================
  # 阶段3: 安全扫描 (Security Scan)
  # ==========================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ github.event.inputs.run_security_scan != 'false' }}
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install security tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck
          pip install bandit safety semgrep

      - name: Run SAST (Static Application Security Testing)
        run: |
          mkdir -p reports
          
          # C代码安全扫描
          cppcheck --enable=security --std=c11 --platform=unix64 \
            --xml --xml-version=2 \
            --output-file=reports/sast-cppcheck.xml \
            atoms/
          
          # Semgrep扫描
          semgrep --config=auto --json --output=reports/sast-semgrep.json atoms/

      - name: Run SCA (Software Composition Analysis)
        run: |
          # 检查Python依赖（如果有）
          if [ -f "requirements.txt" ]; then
            safety check --json --output reports/sca-safety.json || true
          fi

      - name: Run secrets scanning
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./atoms
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --json > reports/secrets.json

      - name: Check for hardcoded secrets
        run: |
          # 检查硬编码的密钥和密码
          grep -r "password\s*=" atoms/ --include="*.c" --include="*.h" > reports/hardcoded-passwords.txt || true
          grep -r "secret\s*=" atoms/ --include="*.c" --include="*.h" >> reports/hardcoded-passwords.txt || true
          grep -r "api_key\s*=" atoms/ --include="*.c" --include="*.h" >> reports/hardcoded-passwords.txt || true
          
          if [ -s reports/hardcoded-passwords.txt ]; then
            echo "::warning::Potential hardcoded secrets found"
            cat reports/hardcoded-passwords.txt
          fi

      - name: Generate security report
        run: |
          echo "# Security Scan Report" > reports/security-summary.md
          echo "" >> reports/security-summary.md
          echo "## Cppcheck Security Issues" >> reports/security-summary.md
          grep -c "<error " reports/sast-cppcheck.xml >> reports/security-summary.md || echo "0" >> reports/security-summary.md
          echo "" >> reports/security-summary.md
          echo "## Semgrep Findings" >> reports/security-summary.md
          jq '.results | length' reports/sast-semgrep.json >> reports/security-summary.md || echo "0" >> reports/security-summary.md

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: reports/
          retention-days: 30

      - name: Security gate check
        run: |
          # 检查高危漏洞
          HIGH_SEVERITY=$(jq '[.results[] | select(.extra.severity == "ERROR")] | length' reports/sast-semgrep.json || echo "0")
          
          if [ "$HIGH_SEVERITY" -gt 0 ]; then
            echo "::error::Found $HIGH_SEVERITY high severity security issues"
            exit 1
          fi
          
          echo "✅ Security scan passed"

  # ==========================================================================
  # 阶段4: 性能基准测试 (Performance Benchmark)
  # ==========================================================================
  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 20
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: atoms-*-Linux-gcc

      - name: Setup benchmark environment
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build time

      - name: Build benchmarks
        working-directory: atoms
        run: |
          mkdir -p build_bench
          cd build_bench
          cmake ../tests/benchmark \
            -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release
          ninja

      - name: Run benchmarks
        working-directory: atoms/build_bench
        run: |
          # 运行性能测试
          for bench in benchmark_*; do
            if [ -x "$bench" ]; then
              echo "Running $bench..."
              ./$bench > "../${bench}_result.txt" 2>&1 || true
            fi
          done

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: atoms/*_result.txt
          retention-days: 30

  # ==========================================================================
  # 阶段5: 质量门禁 (Quality Gates)
  # ==========================================================================
  quality-gate:
    name: Quality Gates
    runs-on: ubuntu-latest
    needs: [code-quality, build, integration-tests, security-scan]
    if: always()
    timeout-minutes: 5
    
    steps:
      - name: Check all jobs status
        run: |
          echo "=== Quality Gates Summary ==="
          echo "Code Quality: ${{ needs.code-quality.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Integration Tests: ${{ needs.integration-tests.result }}"
          echo "Security Scan: ${{ needs.security-scan.result }}"
          
          # 检查必需的作业是否成功
          if [[ "${{ needs.code-quality.result }}" == "failure" ]] || \
             [[ "${{ needs.build.result }}" == "failure" ]] || \
             [[ "${{ needs.integration-tests.result }}" == "failure" ]]; then
            echo "❌ Quality gates failed"
            exit 1
          fi
          
          # 安全扫描失败只警告不阻止
          if [[ "${{ needs.security-scan.result }}" == "failure" ]]; then
            echo "::warning::Security scan found issues"
          fi
          
          echo "✅ All quality gates passed"

  # ==========================================================================
  # 阶段6: 发布制品 (Release Artifacts)
  # ==========================================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [quality-gate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: atoms-*

      - name: Prepare release package
        run: |
          mkdir -p release
          
          # 合并所有平台的构建产物
          for dir in artifacts/atoms-*/; do
            module=$(basename "$dir" | cut -d'-' -f2)
            os=$(basename "$dir" | cut -d'-' -f3)
            compiler=$(basename "$dir" | cut -d'-' -f4)
            
            cp "$dir"/*.tar.gz "release/" 2>/dev/null || true
          done
          
          # 创建校验和
          cd release
          sha256sum *.tar.gz > checksums.sha256

      - name: Generate release notes
        id: notes
        run: |
          cat > release_notes.md << EOF
          # AgentOS Atoms Module Release ${{ env.VERSION }}
          
          ## 构建信息
          - 构建类型: ${{ env.BUILD_TYPE }}
          - 构建时间: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          - Git 提交: ${{ github.sha }}
          
          ## 包含模块
          - corekern: 微内核基础
          - coreloopthree: 三层认知循环
          - memoryrovol: 四层演化记忆
          - syscall: 系统调用层
          - utils: 工具库
          
          ## 支持平台
          - Linux x86_64 (GCC, Clang)
          - macOS arm64/x86_64 (Clang)
          - Windows x64 (MSVC)
          
          ## 安装说明
          \`\`\`bash
          tar -xzf atoms-{module}-${{ env.VERSION }}-linux-gcc.tar.gz
          # 将库文件复制到系统目录或项目目录
          \`\`\`
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: atoms-v${{ env.VERSION }}
          name: Atoms Module v${{ env.VERSION }}
          body_path: release_notes.md
          files: |
            release/*.tar.gz
            release/checksums.sha256
          draft: true
          prerelease: ${{ contains(env.VERSION, 'rc') || contains(env.VERSION, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to GitHub Packages
        run: |
          echo "Uploading to GitHub Packages..."
          # 这里可以添加上传到GHCR的逻辑

  # ==========================================================================
  # 阶段7: 部署通知 (Deployment Notification)
  # ==========================================================================
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [quality-gate, release]
    if: always()
    timeout-minutes: 5
    
    steps:
      - name: Determine status
        id: status
        run: |
          if [[ "${{ needs.quality-gate.result }}" == "success" ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        if: env.SLACK_WEBHOOK != ''
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          curl -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d '{
              "text": "${{ steps.status.outputs.emoji }} Atoms CI/CD: ${{ steps.status.outputs.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*${{ steps.status.outputs.emoji }} Atoms Module CI/CD*\n\n*Status:* ${{ steps.status.outputs.status }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* ${{ github.sha }}\n*Triggered by:* ${{ github.actor }}"
                  }
                }
              ]
            }'

      - name: Create check run
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Atoms CI/CD Summary',
              head_sha: context.sha,
              status: 'completed',
              conclusion: '${{ steps.status.outputs.status }}',
              output: {
                title: 'Atoms Module CI/CD',
                summary: 'Build and test completed with status: ${{ steps.status.outputs.status }}'
              }
            });
