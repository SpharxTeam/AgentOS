name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  BUILD_TYPE: Release
  CC: gcc
  CXX: g++

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          gcc \
          g++ \
          libssl-dev \
          libyaml-dev \
          libcjson-dev \
          clang-tools \
          valgrind

    - name: Configure CMake
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
          -DBUILD_TESTS=ON \
          -DBUILD_WITH_SANITIZERS=ON \
          -DBUILD_WITH_LOGGING=ON

    - name: Build
      run: |
        cd build
        make -j$(nproc)

    - name: Run Tests
      run: |
        cd build
        ctest --output-on-failure --verbose

    - name: Run Sanitizers
      run: |
        cd build
        ctest -T memcheck --output-on-failure

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: build/Testing/

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang-tools \
          cppcheck

    - name: Run clang-format check
      run: |
        find cupolas/src cupolas/include -name "*.c" -o -name "*.h" | \
        xargs clang-format --dry-run --Werror

    - name: Run cppcheck
      run: |
        cppcheck --enable=all --inconclusive --error-exitcode=1 \
          --suppress=missingIncludeSystem \
          cupolas/src cupolas/include

    - name: Run clang-tidy
      run: |
        find cupolas/src cupolas/include -name "*.c" -o -name "*.h" | \
        xargs clang-tidy --warnings-as-errors=*

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          gcc \
          g++ \
          libssl-dev

    - name: Build with ASan
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Debug \
          -DBUILD_WITH_SANITIZERS=ON
        make -j$(nproc)

    - name: Run ASan tests
      run: |
        cd build
        ASAN_OPTIONS=detect_leaks=1 \
        ctest --output-on-failure

    - name: Run Bandit (Python security scanner)
      if: always()
      run: |
        pip install bandit
        bandit -r cupolas/ || true
