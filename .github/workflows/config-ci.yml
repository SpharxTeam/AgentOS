# AgentOS Config 模块 CI/CD Pipeline

name: AgentOS Config CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'config/**'
      - 'scripts/dev/validate_config.py'
  pull_request:
    branches: [main, develop]
    paths:
      - 'config/**'
      - 'scripts/dev/validate_config.py'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        type: choice
        options:
          - development
          - staging
          - production

env:
  BUILD_TYPE: Release
  VERSION: 1.0.0

jobs:
  # ========================================================================
  # 阶段0: 配置验证
  # ========================================================================
  validate-config:
    name: Validate Configuration
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install pyyaml jsonschema
          
      - name: Validate YAML syntax
        run: |
          echo "=== Validating YAML syntax ==="
          for file in config/**/*.yaml config/**/*.yml; do
            echo "Validating $file..."
            python -c "import yaml; yaml.safe_load(open('$file'))" || exit 1
          done
          echo "✓ All YAML files are valid"
      
      - name: Validate JSON syntax
        run: |
          echo "=== Validating JSON syntax ==="
          for file in config/**/*.json; do
            echo "Validating $file..."
            python -c "import json; json.load(open('$file'))" || exit 1
          done
          echo "✓ All JSON files are valid"
      
      - name: Validate against schemas
        run: |
          echo "=== Validating against schemas ==="
          python scripts/dev/validate_config.py --all
          
      - name: Check environment variables
        run: |
          echo "=== Checking environment variables ==="
          python scripts/dev/validate_config.py --check-env
          
      - name: Check config versions
        run: |
          echo "=== Checking config versions ==="
          python scripts/dev/validate_config.py --check-version

  # ========================================================================
  # 阶段1: Schema 验证测试
  # ========================================================================
  schema-validation-test:
    name: Schema Validation Tests
    runs-on: ubuntu-latest
    needs: validate-config
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install pyyaml jsonschema pytest
          
      - name: Run schema validation tests
        run: |
          echo "=== Running schema validation tests ==="
          python -m pytest scripts/dev/validate_config.py -v
          
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schema-validation-results
          path: |
            htmlcov/
            .pytest_cache/

  # ========================================================================
  # 阶段2: 配置完整性检查
  # ========================================================================
  config-integrity-check:
    name: Config Integrity Check
    runs-on: ubuntu-latest
    needs: validate-config
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check required files
        run: |
          echo "=== Checking required config files ==="
          
          required_files=(
            "config/kernel/settings.yaml"
            "config/model/model.yaml"
            "config/agent/registry.yaml"
            "config/skill/registry.yaml"
            "config/security/policy.yaml"
            "config/security/permission_rules.yaml"
            "config/sanitizer/sanitizer_rules.json"
            "config/logging/config.yaml"
            "config/config_management.yaml"
            "config/.env.template"
          )
          
          missing_files=()
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              missing_files+=("$file")
              echo "✗ Missing: $file"
            else
              echo "✓ Found: $file"
            fi
          done
          
          if [ ${#missing_files[@]} -gt 0 ]; then
            echo "❌ Missing ${#missing_files[@]} required file(s)"
            exit 1
          else
            echo "✓ All required files present"
          fi
      
      - name: Check schema files
        run: |
          echo "=== Checking schema files ==="
          
          required_schemas=(
            "config/schema/kernel-settings.schema.json"
            "config/schema/model.schema.json"
            "config/schema/agent-registry.schema.json"
            "config/schema/skill-registry.schema.json"
            "config/schema/security-policy.schema.json"
            "config/schema/sanitizer-rules.schema.json"
            "config/schema/logging.schema.json"
            "config/schema/config-management.schema.json"
            "config/schema/tool-service.schema.json"
          )
          for file in "${required_schemas[@]}"; do
            if [ ! -f "$file" ]; then
              missing_schemas+=("$file")
              echo "✗ Missing: $file"
            else
              echo "✓ Found: $file"
            fi
          done
          
          if [ ${#missing_schemas[@]} -gt 0 ]; then
            echo "❌ Missing ${#missing_schemas[@]} schema file(s)"
            exit 1
          else
            echo "✓ All schema files present"
          fi
      
      - name: Check environment configs
        run: |
          echo "=== Checking environment configs ==="
          
          required_envs=(
            "config/environment/development.yaml"
            "config/environment/staging.yaml"
            "config/environment/production.yaml"
          )
          
          missing_envs=()
          for file in "${required_envs[@]}"; do
            if [ ! -f "$file" ]; then
              missing_envs+=("$file")
              echo "✗ Missing: $file"
            else
              echo "✓ Found: $file"
            fi
          done
          
          if [ ${#missing_envs[@]} -gt 0 ]; then
            echo "❌ Missing ${#missing_envs[@]} environment config(s)"
            exit 1
          else
            echo "✓ All environment configs present"
          fi

  # ========================================================================
  # 阶段3: 安全扫描
  # ========================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: validate-config
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Bandit (Python)
        run: |
          echo "=== Running Bandit security scan ==="
          pip install bandit
          bandit -r config/ -f json -o bandit_report.json || true
          
      - name: Run Safety (Python dependencies)
        run: |
          echo "=== Running Safety scan ==="
          pip install safety
          safety check --json || true
          
      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: config/
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          
      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit_report.json
            .safety/
            trufflehog/

  # ========================================================================
  # 阶段4: 质量门禁
  # ========================================================================
  quality-gate:
    name: Quality Gates
    runs-on: ubuntu-latest
    needs: [validate-config, schema-validation-test, config-integrity-check, security-scan]
    
    steps:
      - name: Check results
        run: |
          echo "=== Checking quality gates ==="
          echo "Validation: ${{ needs.validate-config.result }}"
          echo "Schema Tests: ${{ needs.schema-validation-test.result }}"
          echo "Integrity Check: ${{ needs.config-integrity-check.result }}"
          echo "Security Scan: ${{ needs.security-scan.result }}"
          
          if [[ "${{ needs.validate-config.result }}" == "failure" ]] || \
             [[ "${{ needs.schema-validation-test.result }}" == "failure" ]] || \
             [[ "${{ needs.config-integrity-check.result }}" == "failure" ]] || \
             [[ "${{ needs.security-scan.result }}" == "failure" ]]; then
            echo "❌ Quality gates failed"
            exit 1
          fi
          
          echo "✅ All quality gates passed"

  # ========================================================================
  # 阶段5: 配置打包
  # ========================================================================
  package-config:
    name: Package Configuration
    runs-on: ubuntu-latest
    needs: quality-gate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Create config package
        run: |
          echo "=== Creating config package ==="
          VERSION=$(grep -E '^version = ' pyproject.toml 2>/dev/null | cut -d'"' -f2 || echo "1.0.0")
          PACKAGE_NAME="agentos-config-${VERSION}"
          
          mkdir -p dist
          tar -czvf "dist/${PACKAGE_NAME}.tar.gz" \
            config/ \
            --exclude='*.pyc' \
            --exclude='__pycache__' \
            --exclude='.git'
          
          echo "✓ Created ${PACKAGE_NAME}.tar.gz"
          echo "PACKAGE_NAME=${PACKAGE_NAME}" >> $GITHUB_OUTPUT
          
      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: config-package
          path: dist/*.tar.gz
          retention-days: 7

  # ========================================================================
  # 阶段6: 部署到不同环境
  # ========================================================================
  deploy-development:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: package-config
    environment: development
    if: github.event.inputs.environment == 'development' || (github.event_name == 'push' && github.ref == 'refs/heads/develop')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy config
        run: |
          echo "=== Deploying to development ==="
          echo "Development environment: local testing, full logging"
          echo "Config validation: PASSED"
          echo "Ready for development use"
          
      - name: Notify deployment
        run: |
          echo "✓ Development deployment complete"
          echo "Config files validated and ready for local development"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: package-config
    environment: staging
    if: github.event.inputs.environment == 'staging' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy config
        run: |
          echo "=== Deploying to staging ==="
          echo "Staging environment: production-like, full validation"
          echo "Config validation: PASSED"
          echo "Ready for staging deployment"
          
      - name: Notify deployment
        run: |
          echo "✓ Staging deployment complete"
          echo "Config files validated and ready for staging"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: package-config
    environment: production
    if: github.event.inputs.environment == 'production' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy config
        run: |
          echo "=== Deploying to production ==="
          echo "Production environment: minimal logging, strict validation"
          echo "Config validation: PASSED"
          echo "Ready for production deployment"
          
      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
          
      - name: Notify deployment
        run: |
          echo "✓ Production deployment complete"
          echo "Config files validated and released"
