﻿﻿﻿# =============================================================================
# AgentOS cupolas Module CI/CD Notifications
# Version: 1.0.0
# Description: Handles notifications for CI/CD events
# =============================================================================

name: cupolas Notifications

on:
  workflow_run:
    workflows: ["cupolas CI/CD"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      event_type:
        description: 'Event type to simulate'
        required: true
        default: 'build_completed'
        type: choice
        options:
          - build_completed
          - deployment_completed
          - security_alert
      status:
        description: 'Status'
        required: true
        default: 'success'
        type: choice
        options:
          - success
          - failure
          - cancelled

env:
  MODULE_NAME: cupolas

jobs:
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Determine event details
        id: event
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            EVENT_TYPE="${{ github.event.inputs.event_type }}"
            STATUS="${{ github.event.inputs.status }}"
          else
            EVENT_TYPE="build_completed"
            STATUS="${{ github.event.workflow_run.conclusion }}"
          fi
          
          echo "event_type=$EVENT_TYPE" >> $GITHUB_OUTPUT
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          
          if [[ "$STATUS" == "success" ]]; then
            EMOJI="✅"
            COLOR="good"
          elif [[ "$STATUS" == "failure" ]]; then
            EMOJI="❌"
            COLOR="danger"
          else
            EMOJI="⏹️"
            COLOR="warning"
          fi
          
          echo "emoji=$EMOJI" >> $GITHUB_OUTPUT
          echo "color=$COLOR" >> $GITHUB_OUTPUT

      - name: Generate notification message
        id: message
        run: |
          EVENT_TYPE="${{ steps.event.outputs.event_type }}"
          STATUS="${{ steps.event.outputs.status }}"
          EMOJI="${{ steps.event.outputs.emoji }}"
          
          case "$EVENT_TYPE" in
            build_completed)
              TITLE="Build Completed"
              MESSAGE="$EMOJI cupolas module build has completed with status: $STATUS"
              DETAILS="Branch: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          Commit: ${{ github.event.workflow_run.head_sha || github.sha }}
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id || github.run_id }}"
              ;;
            deployment_completed)
              TITLE="Deployment Completed"
              MESSAGE="$EMOJI cupolas module deployment has completed with status: $STATUS"
              DETAILS="Environment: ${{ github.event.inputs.environment || 'unknown' }}
          Version: ${{ github.event.inputs.version || 'unknown' }}"
              ;;
            security_alert)
              TITLE="Security Alert"
              MESSAGE="$EMOJI Security issue detected in cupolas module"
              DETAILS="Severity: ${{ github.event.inputs.severity || 'unknown' }}
          Details: ${{ github.event.inputs.details || 'Check security reports' }}"
              ;;
            *)
              TITLE="CI/CD Event"
              MESSAGE="$EMOJI cupolas module CI/CD event: $EVENT_TYPE"
              DETAILS="Status: $STATUS"
              ;;
          esac
          
          # Escape for JSON
          MESSAGE=$(echo "$MESSAGE" | jq -Rs .)
          DETAILS=$(echo "$DETAILS" | jq -Rs .)
          
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "details<<EOF" >> $GITHUB_OUTPUT
          echo "$DETAILS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send Slack notification
        if: env.SLACK_WEBHOOK != ''
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_CUPOLAS }}
        run: |
          curl -X POST "${{ env.SLACK_WEBHOOK }}" \
            -H 'Content-type: application/json' \
            -d '{
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "${{ steps.event.outputs.emoji }} ${{ steps.message.outputs.title }}"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ steps.message.outputs.message }}"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "```\n${{ steps.message.outputs.details }}\n```"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Run"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id || github.run_id }}"
                    }
                  ]
                }
              ],
              "attachments": [
                {
                  "color": "${{ steps.event.outputs.color }}",
                  "blocks": []
                }
              ]
            }'
        continue-on-error: true

      - name: Send email notification
        if: env.SMTP_SERVER != '' && steps.event.outputs.status == 'failure'
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: |
          # Send email using Python
          python3 << 'EOF'
          import os
          import smtplib
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart
          
          smtp_server = os.environ.get('SMTP_SERVER', '')
          smtp_user = os.environ.get('SMTP_USER', '')
          smtp_pass = os.environ.get('SMTP_PASS', '')
          
          if not smtp_server:
              print("SMTP not configured, skipping email")
              exit(0)
          
          msg = MIMEMultipart('alternative')
          msg['Subject'] = f"[AgentOS] ${{ steps.message.outputs.title }}"
          msg['From'] = smtp_user
          msg['To'] = 'team@spharx.cn'
          
          text = f"""${{ steps.message.outputs.message }}

          Details:
          ${{ steps.message.outputs.details }}
          """
          
          html = f"""<html>
          <body>
          <h2>${{ steps.message.outputs.title }}</h2>
          <p>${{ steps.message.outputs.message }}</p>
          <pre>${{ steps.message.outputs.details }}</pre>
          <p><a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id || github.run_id }}">View Run</a></p>
          </body>
          </html>
          """
          
          msg.attach(MIMEText(text, 'plain'))
          msg.attach(MIMEText(html, 'html'))
          
          try:
              with smtplib.SMTP(smtp_server, 587) as server:
                  server.starttls()
                  server.login(smtp_user, smtp_pass)
                  server.sendmail(smtp_user, 'team@spharx.cn', msg.as_string())
              print("Email sent successfully")
          except Exception as e:
              print(f"Failed to send email: {e}")
          EOF
        continue-on-error: true

      - name: Create GitHub Issue on Failure
        if: steps.event.outputs.status == 'failure' && github.event_name == 'workflow_run'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 CI/CD Failure: cupolas module`;
            const body = `
            ## CI/CD Pipeline Failure
            
            **Workflow:** ${{ github.event.workflow_run.name }}
            **Branch:** ${{ github.event.workflow_run.head_branch }}
            **Commit:** ${{ github.event.workflow_run.head_sha }}
            **Run:** [View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }})
            
            ### Next Steps
            1. Review the workflow logs
            2. Fix the issue
            3. Close this issue
            
            ---
            *This issue was automatically created by the CI/CD notification system.*
            `;
            
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci-failure,cupolas'
            });
            
            // Don't create duplicate issues
            const existingIssue = issues.data.find(i => i.title === title);
            if (!existingIssue) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['ci-failure', 'cupolas', 'automated']
              });
            }
        continue-on-error: true

  log-event:
    name: Log CI/CD Event
    runs-on: ubuntu-latest
    if: always()
    needs: [notify]
    steps:
      - name: Create event log
        run: |
          mkdir -p logs
          cat > logs/cicd_event.json << EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "module": "${{ env.MODULE_NAME }}",
            "event_type": "${{ github.event_name }}",
            "workflow": "${{ github.event.workflow_run.name || 'cupolas CI/CD' }}",
            "status": "${{ github.event.workflow_run.conclusion || 'unknown' }}",
            "branch": "${{ github.event.workflow_run.head_branch || github.ref_name }}",
            "commit_sha": "${{ github.event.workflow_run.head_sha || github.sha }}",
            "run_id": "${{ github.event.workflow_run.id || github.run_id }}",
            "run_number": "${{ github.run_number }}",
            "actor": "${{ github.actor }}",
            "repository": "${{ github.repository }}",
            "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id || github.run_id }}"
          }
          EOF
          
          echo "Event logged:"
          cat logs/cicd_event.json

      - name: Upload event log
        uses: actions/upload-artifact@v4
        with:
          name: cicd-event-log
          path: logs/
          retention-days: 30
