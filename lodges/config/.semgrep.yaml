# lodges Module Security Configuration
# "From data intelligence emerges."

# Semgrep Configuration
# https://semgrep.dev/docs/

rules:
  # Use built-in security rules
  - manager: p/security-audit
  - manager: p/secrets
  - manager: p/c
  - manager: p/owasp-top-ten

  # Custom rules for lodges module
  - id: lodges-sql-injection
    languages: [c]
    message: "Potential SQL injection vulnerability. Use parameterized queries."
    severity: ERROR
    pattern: |
      sprintf($BUF, "SELECT ... %s ...", $VAR);
    fix: |
      sqlite3_bind_text($STMT, 1, $VAR, -1, SQLITE_STATIC);

  - id: lodges-buffer-overflow
    languages: [c]
    message: "Potential buffer overflow. Use strncpy with size check."
    severity: ERROR
    pattern: |
      strcpy($DST, $SRC);
    fix: |
      strncpy($DST, $SRC, sizeof($DST) - 1);

  - id: lodges-format-string
    languages: [c]
    message: "Potential format string vulnerability. Use format specifiers."
    severity: WARNING
    pattern: |
      printf($VAR);
    fix: |
      printf("%s", $VAR);

  - id: lodges-memory-leak
    languages: [c]
    message: "Potential memory leak. Ensure proper cleanup."
    severity: WARNING
    pattern-either:
      - pattern: |
          $PTR = malloc(...);
          ...
          return;
      - pattern: |
          $PTR = calloc(...);
          ...
          return;

  - id: lodges-uninitialized-pointer
    languages: [c]
    message: "Pointer may be used before initialization."
    severity: WARNING
    pattern: |
      $TYPE * $PTR;
      ...
      *$PTR = ...;

paths:
  include:
    - lodges/src/
    - lodges/include/
  exclude:
    - lodges/tests/
    - lodges/build/

