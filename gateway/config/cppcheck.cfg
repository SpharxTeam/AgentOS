# cppcheck configuration for AgentOS gateway Module
# Version: 1.0.0

# 项目配置
--std=c11
--platform=unix64

# 启用的检查项
--enable=all

# 并行处理
-j4

# 内联抑制
--inline-suppr

# 强制检查所有定义
--force

# 输出格式
--xml
--xml-version=2

# 抑制特定警告（根据项目需求调整）
--suppress=missingIncludeSystem
--suppress=unusedFunction

# 包含路径
-ID:/Spharx/SpharxWorks/AgentOS/gateway/src
-ID:/Spharx/SpharxWorks/AgentOS/gateway/include

# 定义宏
-DAGENTOS_API=
-DAGENTOS_EXPORT=
-D_GNU_SOURCE
-D_POSIX_C_SOURCE=200809L

# 检查的源文件
gateway/src/*.c
gateway/src/gateway/*.c

