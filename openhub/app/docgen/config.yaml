# Documentation Generator Configuration
# =====================================

# Input and Output Directories
input_dir: "./src"
output_dir: "./docs"
template_dir: "./templates"

# File Watching
watch_mode: false
watch_interval: 2.0  # seconds

# File Patterns
include_patterns:
  - "*.md"
  - "*.py"
  - "*.yaml"
  - "*.json"
  - "*.txt"

exclude_patterns:
  - "__pycache__"
  - "*.pyc"
  - ".git"
  - "node_modules"
  - "*.log"
  - "*.tmp"

# Markdown Processing
markdown_extensions:
  - "extra"
  - "codehilite"
  - "toc"
  - "tables"

# Template Settings
template_variables:
  project_name: "OpenHub Documentation"
  version: "1.0.0"
  author: "SPHARX Team"
  generated_date: "{{ current_date }}"

# Output Formats
output_formats:
  - format: "html"
    extension: ".html"
    template: "default.html.j2"
  
  - format: "pdf"
    extension: ".pdf"
    template: "pdf.html.j2"
    requires: "weasyprint"  # Optional dependency
  
  - format: "markdown"
    extension: ".md"
    template: "markdown.j2"

# Navigation
generate_navigation: true
navigation_depth: 3
include_table_of_contents: true

# Search
enable_search: true
search_index_file: "search_index.json"

# Analytics (Optional)
analytics:
  enabled: false
  provider: "google"  # or "plausible", "matomo"
  tracking_id: ""

# Theme
theme: "default"
theme_options:
  primary_color: "#2563eb"
  secondary_color: "#7c3aed"
  font_family: "Inter, system-ui, sans-serif"
  code_font: "JetBrains Mono, monospace"

# Performance
cache_enabled: true
cache_ttl: 3600  # seconds
parallel_processing: true
max_workers: 4

# Logging
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "docgen.log"
  max_size: 10485760  # 10MB
  backup_count: 5

# Validation
validate_output: true
check_links: true
check_images: true
validate_html: false  # Requires html5validator

# Notifications
notifications:
  enabled: false
  provider: "email"  # or "slack", "discord", "webhook"
  settings:
    email_to: ""
    email_from: ""
    smtp_server: "localhost"
    smtp_port: 25

# Custom Hooks
hooks:
  pre_generate: ""
  post_generate: ""
  on_error: ""