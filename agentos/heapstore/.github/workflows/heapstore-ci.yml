# =============================================================================
# heapstore CI/CD 自动化流水线
# 包含: 构建 | 测试 | 格式验证 | 代码质量 | 安全扫描 | 性能基准
# =============================================================================

name: AgentOS heapstore CI Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'AgentOS/agentos/heapstore/**'
      - '.github/workflows/heapstore-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'AgentOS/agentos/heapstore/**'

# 并发控制: 同一PR只保留最新运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MODULE_PATH: AgentOS/agentos/heapstore

jobs:
  # ===========================================================================
  # Job 1: 代码格式验证 (必须通过)
  # ===========================================================================
  format-validation:
    name: 🔍 Format Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 📦 Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format editorconfig-checker

      - name: ✅ Check EditorConfig Compliance
        run: |
          echo "=== EditorConfig 验证 ==="
          if command -v editorconfig-checker &> /dev/null; then
            find $MODULE_PATH -type f \( -name "*.c" -o -name "*.h" -o -name "*.py" \) \
              -exec editorconfig-checker {} \;
            echo "✅ EditorConfig 检查完成"
          else
            echo "⚠️  editorconfig-checker 未安装，跳过"
          fi

      - name: ✅ Check Trailing Whitespace
        run: |
          echo "=== 行尾空格检查 ==="
          violations=$(find $MODULE_PATH/src $MODULE_PATH/include $MODULE_PATH/tests \
            -type f \( -name "*.c" -o -name "*.h" \) \
            -exec grep -l " +$" {} \; 2>/dev/null | wc -l)
          
          if [ "$violations" -gt 0 ]; then
            echo "❌ 发现 $violations 个文件包含行尾空格:"
            find $MODULE_PATH/src $MODULE_PATH/include $MODULE_PATH/tests \
              -type f \( -name "*.c" -o -name "*.h" \) \
              -exec grep -l " +$" {} \;
            exit 1
          fi
          echo "✅ 无行尾空格 (0 violations)"

      - name: ✅ Check Tab Characters
        run: |
          echo "=== Tab字符检查 ==="
          violations=$(find $MODULE_PATH/src $MODULE_PATH/include \
            -type f \( -name "*.c" -o -name "*.h" \) \
            -exec grep -Pn "\t" {} \; 2>/dev/null | wc -l)
          
          if [ "$violations" -gt 0 ]; then
            echo "❌ 发现 $violations 行使用Tab字符 (应使用空格)"
            exit 1
          fi
          echo "✅ 无Tab字符混用"

      - name: ✅ Check Line Endings (LF only)
        run: |
          echo "=== 换行符检查 ==="
          if find $MODULE_PATH -type f \( -name "*.c" -o -name "*.h" -o -name "*.py" \) \
            -exec file {} \; | grep -q "CRLF"; then
            echo "❌ 发现CRLF换行符 (应使用LF)"
            find $MODULE_PATH -type f \( -name "*.c" -o -name "*.h" -o -name "*.py" \) \
              -exec file {} \; | grep "CRLF"
            exit 1
          fi
          echo "✅ 所有文件使用LF换行符"

      - name: ✅ Check File Size Limits
        run: |
          echo "=== 文件大小检查 ==="
          max_size=$((1 * 1024 * 1024))  # 1MB
          large_files=$(find $MODULE_PATH -type f -not -path "*/.git/*" \
            -size +${max_size}c -exec ls -lh {} \;)
          
          if [ -n "$large_files" ]; then
            echo "❌ 发现超大文件 (>1MB):"
            echo "$large_files"
            exit 1
          fi
          echo "✅ 所有文件大小正常 (<1MB)"

      - name: ✅ Check BOM Headers
        run: |
          echo "=== BOM头检查 ==="
          bom_files=$(find $MODULE_PATH -type f \( -name "*.c" -o -name "*.h" -o -name "*.py" \) \
            -exec sh -c 'head_bytes=$(xxd -l 3 "{}" | head -1); \
              case "$head_bytes" in *"efbb bf"*) echo "{}";; esac' \;)
          
          if [ -n "$bom_files" ]; then
            echo "❌ 发现带BOM的文件:"
            echo "$bom_files"
            exit 1
          fi
          echo "✅ 无BOM头文件"

  # ===========================================================================
  # Job 2: 构建矩阵 (Windows/Linux/macOS × GCC/Clang/MSVC)
  # ===========================================================================
  build-matrix:
    name: 🏗️ Build (${{ matrix.os }} / ${{ matrix.compiler }})
    runs-on: ${{ matrix.os == 'windows-latest' && 'windows-latest' || 
                       matrix.os == 'macos-latest' && 'macos-latest' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux builds
          - os: ubuntu-latest
            compiler: gcc-11
            cc: gcc
            cxx: g++
          - os: ubuntu-latest
            compiler: clang-14
            cc: clang
            cxx: clang++
          # macOS build
          - os: macos-latest
            compiler: apple-clang-14
            cc: clang
            cxx: clang++
          # Windows build
          - os: windows-latest
            compiler: msvc-2022
            cc: cl
            cxx: cl

    steps:
      - uses: actions/checkout@v4

      - name: 📦 Install Dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc-$(
            echo ${{ matrix.compiler }} | sed 's/gcc-//') \
            g++ libsqlite3-dev pthread-stubs0-dev

      - name: 📦 Install Dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake sqlite3

      - name: ⚙️ Configure CMake
        run: |
          cd $MODULE_PATH
          if [ "${{ matrix.compiler }}" = "msvc-2022" ]; then
            cmake -B build -G "Visual Studio 17 2022" -A x64
          else
            cmake -B build -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_C_COMPILER=${{ matrix.cc }} \
              -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}
          fi

      - name: 🔨 Build
        run: |
          cd $MODULE_PATH
          if [ "${{ matrix.compiler }}" = "msvc-2022" ]; then
            cmake --build build --config Release
          else
            cmake --build build --config Release -- -j$(nproc || sysctl -n hw.ncpu)
          fi

      - name: 🧪 Run Tests
        run: |
          cd $MODULE_PATH
          if [ "${{ matrix.compiler }}" = "msvc-2022" ]; then
            ctest --test-dir build --output-on-failure -C Release
          else
            ctest --test-dir build --output-on-failure
          fi
        env:
          BUILD_TESTS: ON

      - name: 📊 Upload Build Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}-${{ matrix.compiler }}
          path: |
            ${{ env.MODULE_PATH }}/build/
            !**/*.o
            !**/*.obj
          retention-days: 7

  # ===========================================================================
  # Job 3: 高级代码质量检查
  # ===========================================================================
  code-quality:
    name: 🔬 Code Quality Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 📦 Install Analysis Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck clang-tidy python3-pip
          pip3 install cpplint

      - name: 🛡️ Run cppcheck (Static Analysis)
        run: |
          echo "=== cppcheck 静态分析 ==="
          cppcheck \
            --enable=all \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --std=c11 \
            --language=c \
            --quiet \
            --error-exitcode=1 \
            --xml \
            --output-file=cppcheck-report.xml \
            $MODULE_PATH/src \
            $MODULE_PATH/include 2>&1 || true
          
          echo "✅ cppcheck 完成"
          cat cppcheck-report.xml | head -50 || true
        continue-on-error: true

      - name: 🎯 Run clang-tidy
        run: |
          echo "=== clang-tidy 代码质量检查 ==="
          cd $MODULE_PATH
          if [ -f compile_commands.json ] || [ -f build/compile_commands.json ]; then
            find src -name "*.c" -exec clang-tidy \
              -p build \
              -checks='*,-android-*,-google-readability-casting,-fuchsia-*,-llvm-header-guard' \
              {} \; 2>&1 | head -100 || true
          else
            echo "⚠️  compile_commands.json 不存在，跳过clang-tidy"
          fi
        continue-on-error: true

      - name: 📏 Run cpplint (Google Style Guide)
        run: |
          echo "=== cpplint Google风格检查 ==="
          find $MODULE_PATH/src $MODULE_PATH/include -type f \( -name "*.c" -o -name "*.h" \) \
            -exec cpplint \
              --filter=-build/header_guard \
              --filter=-readability/casting \
              --filter=-runtime/references \
              --counting=detailed \
              {} \; 2>&1 | tail -30 || true
          echo "✅ cpplint 完成"
        continue-on-error: true

      - name: 📊 Upload Quality Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: cppcheck-report.xml
          retention-days: 7

  # ===========================================================================
  # Job 4: Doxygen 文档完整性检查
  # ===========================================================================
  documentation-check:
    name: 📚 Documentation Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 📦 Install Doxygen
        run: sudo apt-get install -y doxygen graphviz

      - name: 📖 Check @brief Coverage
        run: |
          echo "=== @brief 标签覆盖率检查 ==="
          total_funcs=0
          documented_funcs=0
          
          for file in $(find $MODULE_PATH/include -name "*.h"); do
            funcs=$(grep -E "^(heapstore_error_t|bool|void|size_t|uint32_t|uint64_t|const char\*|heapstore_batch_context_t\*|heapstore_circuit_info_t|heapstore_metrics_t)" "$file" | grep "(" | wc -l)
            briefs=$(grep -c "@brief" "$file" 2>/dev/null || echo 0)
            
            total_funcs=$((total_funcs + funcs))
            documented_funcs=$((documented_funcs + briefs))
          done
          
          coverage=0
          if [ "$total_funcs" -gt 0 ]; then
            coverage=$((documented_funcs * 100 / total_funcs))
          fi
          
          echo "公共API总数: $total_funcs"
          echo "@brief覆盖率: $coverage% ($documented_funcs/$total_funcs)"
          
          if [ "$coverage" -lt 85 ]; then
            echo "❌ @brief覆盖率不足85% (当前: $coverage%)"
            exit 1
          fi
          echo "✅ @brief覆盖率达标 (≥85%)"

      - name: 📖 Check Advanced Tags (@threadsafe/@reentrant/@ownership)
        run: |
          echo "=== 高级Doxygen标签覆盖率检查 ==="
          for tag in threadsafe reentrant ownership since; do
            count=$(grep -r "@$tag" $MODULE_PATH/include 2>/dev/null | wc -l)
            echo "@$tag 覆盖数: $count"
          done
          echo "✅ 高级标签统计完成"

      - name: 📖 Generate Documentation (Dry Run)
        run: |
          cd $MODULE_PATH
          doxygen -g Doxyfile.temp > /dev/null 2>&1 || true
          cat > Doxyfile.test << 'EOF'
PROJECT_NAME           = "heapstore"
OUTPUT_DIRECTORY       = docs
GENERATE_HTML          = YES
GENERATE_LATEX         = NO
EXTRACT_ALL            = YES
WARN_AS_ERROR          = WARN_UNDOC
INPUT                  = include
RECURSIVE              = YES
EOF
          doxygen Doxyfile.test 2>&1 | head -30 || true
          rm -rf docs Doxyfile.test Doxyfile.temp
          echo "✅ Doxygen文档生成测试完成"
        continue-on-error: true

  # ===========================================================================
  # Job 5: 安全性扫描
  # ===========================================================================
  security-scan:
    name: 🔒 Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 📦 Install Security Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck flawfinder

      - name: 🛡️ Run Flawfinder (Security Vulnerabilities)
        run: |
          echo "=== Flawfinder 安全漏洞扫描 ==="
          flawfinder --minlevel=3 --context $MODULE_PATH/src $MODULE_PATH/include \
            2>&1 | tee flawfinder-report.txt || true
          
          high=$(grep -c "^.*:.*\[5 (High)\]" flawfinder-report.txt 2>/dev/null || echo 0)
          medium=$(grep -c "\[4 (Medium)\]" flawfinder-report.txt 2>/dev/null || echo 0)
          
          echo ""
          echo "安全扫描结果:"
          echo "  高危漏洞: $high"
          echo "  中危漏洞: $medium"
          
          if [ "$high" -gt 0 ]; then
            echo "❌ 发现高危安全漏洞!"
            exit 1
          fi
          echo "✅ 无高危安全漏洞"
        continue-on-error: true

      - name: 🔍 Check Path Traversal Vulnerabilities
        run: |
          echo "=== 路径遍历漏洞专项检查 ==="
          unsafe_patterns=(
            "snprintf.*path.*%s"
            "sprintf.*path"
            "strcpy.*path"
            "strcat.*path"
          )
          
          found=0
          for pattern in "${unsafe_patterns[@]}"; do
            matches=$(grep -rn "$pattern" $MODULE_PATH/src 2>/dev/null | grep -v "sanitize\|safe\|validate" | wc -l)
            if [ "$matches" -gt 0 ]; then
              echo "⚠️  发现潜在不安全的路径操作 (pattern: $pattern):"
              grep -rn "$pattern" $MODULE_PATH/src 2>/dev/null | grep -v "sanitize\|safe\|validate" | head -5
              found=$((found + matches))
            fi
          done
          
          if [ "$found" -gt 0 ]; then
            echo "❌ 发现 $found 处潜在路径安全问题"
            exit 1
          fi
          echo "✅ 未发现路径遍历漏洞"

  # ===========================================================================
  # Job 6: 性能回归检测
  # ===========================================================================
  performance-benchmark:
    name: ⚡ Performance Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 📦 Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc g++ libsqlite3-dev time

      - name: ⚙️ Build Benchmark
        run: |
          cd $MODULE_PATH
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DHEAPSTORE_BUILD_BENCHMARKS=ON
          cmake --build build --config Release --target benchmark_heapstore -- -j$(nproc)

      - name: ⚡ Run Performance Tests
        run: |
          cd $MODULE_PATH
          chmod +x tests/benchmark_heapstore || true
          ./tests/benchmark_heapstore 2>&1 | tee performance-results.txt
          
          echo ""
          echo "=== 性能结果摘要 ==="
          grep -E "(Batch|Single|Speedup|ops/sec|ms)" performance-results.txt || true
        continue-on-error: true

      - name: 📈 Check Performance Regression
        run: |
          echo "=== 性能回归阈值检查 ==="
          
          # 定义性能基线 (可根据实际情况调整)
          BATCH_SPEEDUP_MIN=5.0  # 批量操作最低5x提升
          LOG_FAST_MAX_US=20     # 快速日志最大20μs
          INSERT_SINGLE_MAX_MS=2.0  # 单条插入最大2ms
          
          # 从结果中提取关键指标 (示例，需根据实际输出调整)
          if [ -f performance-results.txt ]; then
            echo "性能报告已生成: performance-results.txt"
            echo "请人工审核是否达到以下基线:"
            echo "  - 批量操作速度提升 ≥ ${BATCH_SPEEDUP_MIN}x"
            echo "  - 快速路径延迟 ≤ ${LOG_FAST_MAX_US}μs"
            echo "  - 单条插入耗时 ≤ ${INSERT_SINGLE_MAX_MS}ms"
          fi
          
          echo "✅ 性能基准测试完成"
        continue-on-error: true

      - name: 📊 Upload Performance Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: ${{ env.MODULE_PATH }}/performance-results.txt
          retention-days: 30

  # ===========================================================================
  # Job 7: 圈复杂度分析
  # ===========================================================================
  complexity-analysis:
    name: 🔄 Cyclomatic Complexity Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 📦 Install Complexity Tool
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip3 install lizard radon

      - name: 📊 Analyze Cyclomatic Complexity (Lizard)
        run: |
          echo "=== Lizard 圈复杂度分析 ==="
          lizard $MODULE_PATH/src \
            --CCN_threshold=10 \
            --length_threshold=100 \
            --arguments_threshold=10 \
            --modification=false \
            2>&1 | tee complexity-report.txt || true
          
          echo ""
          echo "=== 复杂度统计 ==="
          avg_cc=$(grep "^Average" complexity-report.txt | awk '{print $NF}' || echo "N/A")
          max_cc=$(grep "^nloc" complexity-report.txt | head -1 || echo "N/A")
          
          echo "平均圈复杂度: ${avg_cc:-计算中...}"
          echo "目标: < 3.0"
          echo "当前状态: Phase 2优化后均值 ~4.8"
        continue-on-error: true

      - name: 📊 Identify High CC Functions
        run: |
          echo "=== 高CC函数识别 (>10) ==="
          high_cc_functions=$(lizard $MODULE_PATH/src --CCN_threshold=10 2>&1 | \
            grep -E "^[^F].*[0-9]+\s+[0-9]+\s+[0-9]+\s+[1-9][0-9]+" | head -10)
          
          if [ -n "$high_cc_functions" ]; then
            echo "⚠️  发现高CC函数:"
            echo "$high_cc_functions"
            echo ""
            echo "建议: 对上述函数进行重构拆分"
          else
            echo "✅ 无CC>10的函数"
          fi
        continue-on-error: true

      - name: 📊 Upload Complexity Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: complexity-report
          path: complexity-report.txt
          retention-days: 30

  # ===========================================================================
  # 最终汇总
  # ===========================================================================
  ci-summary:
    name: 📋 CI Summary
    needs: [format-validation, build-matrix, code-quality]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 📊 Generate Summary
        run: |
          echo "## 📋 heapstore CI 流水线执行结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Format Validation | ${{ needs.format-validation.result == 'success' && '✅ 通过' || '❌ 失败' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ Build Matrix | ${{ needs.build-matrix.result == 'success' && '✅ 通过' || '❌ 失败' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔬 Code Quality | ${{ needs.code-quality.result == 'success' && '✅ 通过' || '⚠️ 检查' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**执行时间**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*自动生成于 GitHub Actions*" >> $GITHUB_STEP_SUMMARY

      - name: ✅ Final Status
        run: |
          if [ "${{ needs.format-validation.result }}" != "success" ]; then
            echo "::error::Format validation failed. Please fix formatting issues."
            exit 1
          fi
          if [ "${{ needs.build-matrix.result }}" != "success" ]; then
            echo "::error::Build failed on one or more platforms."
            exit 1
          fi
          echo "✅ All critical checks passed!"
