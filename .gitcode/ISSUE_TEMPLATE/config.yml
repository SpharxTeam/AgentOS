# Issue Configuration / Issue 配置
# This file configures the issue templates and settings for the repository.
# 本文件配置仓库的 Issue 模板和设置。

# Contact Information / 联系信息
contact_links:
  - name: Security Vulnerability Report / 安全漏洞报告
    url: https://gitcode.com/spharx/agentos/security
    about: |
      Please do not report security vulnerabilities via public issues. 
      请勿通过公开 Issue 报告安全漏洞。
      See SECURITY.md for proper reporting procedures.
      请参阅 SECURITY.md 了解正确的报告流程。
  
  - name: Architecture Questions / 架构问题
    url: https://gitcode.com/spharx/agentos/blob/main/agentos/manuals/ARCHITECTURAL_PRINCIPLES.md
    about: |
      Read our ARCHITECTURAL_PRINCIPLES.md for design principles.
      阅读我们的 ARCHITECTURAL_PRINCIPLES.md 了解设计原则。
  
  - name: Contributing Guide / 贡献指南
    url: https://gitcode.com/spharx/agentos/blob/main/CONTRIBUTING.md
    about: |
      Please read our contributing guide before submitting issues or PRs.
      请在提交 Issue 或 PR 之前阅读贡献指南。

# Blank Issue Configuration / 空白 Issue 配置
blank_issues_enabled: true

# Issue Template Organization / Issue 模板组织
issue_templates:
  - bug_report.md
  - feature_request.md

# Labels / 标签管理
labels:
  - name: bug
    color: d73a4a
    description: Something isn't working / 有问题的功能
  
  - name: enhancement
    color: a2eeef
    description: New feature or request / 新功能或请求
  
  - name: documentation
    color: 0075ca
    description: Improvements or additions to documentation / 文档改进或补充
  
  - name: security
    color: d93f0b
    description: Security-related issues / 安全相关问题
  
  - name: performance
    color: 0e8a16
    description: Performance improvements / 性能改进
  
  - name: refactoring
    color: 5319e7
    description: Code refactoring / 代码重构
  
  - name: testing
    color: 0075ca
    description: Testing improvements / 测试改进
  
  - name: architecture
    color: fbca04
    description: Architecture-related issues / 架构相关问题
  
  - name: good first issue
    color: 7057ff
    description: Good for newcomers / 适合新手
  
  - name: help wanted
    color: 008672
    description: Extra attention is needed / 需要额外关注

# Auto-Assignment Rules / 自动分配规则
auto_assign:
  enabled: false
  # Note: Code owners are defined in CODEOWNERS file
  # 注意：代码所有者在 CODEOWNERS 文件中定义
