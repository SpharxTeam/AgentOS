name: TypeScript SDK CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'agentos/toolkit/typescript/**'
  pull_request:
    branches: [main]
    paths:
      - 'agentos/toolkit/typescript/**'

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          working-directory: agentos/toolkit/typescript

      - name: Install dependencies
        run: npm ci
        working-directory: agentos/toolkit/typescript

      - name: Run ESLint
        run: npm run lint
        working-directory: agentos/toolkit/typescript

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          working-directory: agentos/toolkit/typescript

      - name: Install dependencies
        run: npm ci
        working-directory: agentos/toolkit/typescript

      - name: Run TypeScript compiler
        run: npx tsc --noEmit
        working-directory: agentos/toolkit/typescript

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          working-directory: agentos/toolkit/typescript

      - name: Install dependencies
        run: npm ci
        working-directory: agentos/toolkit/typescript

      - name: Run tests
        run: npm test -- --coverage
        working-directory: agentos/toolkit/typescript

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: ./agentos/toolkit/typescript/coverage/lcov.info
          flags: typescript
          name: codecov-typescript
        continue-on-error: true

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          working-directory: agentos/toolkit/typescript

      - name: Install dependencies
        run: npm ci
        working-directory: agentos/toolkit/typescript

      - name: Build package
        run: npm run build
        working-directory: agentos/toolkit/typescript

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: typescript-dist
          path: agentos/toolkit/typescript/dist
          retention-days: 7
