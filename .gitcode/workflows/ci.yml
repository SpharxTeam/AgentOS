# AgentOS CI/CD Pipeline (GitCode Actions)
#
# 优化版本 V3.0 - 2026-04-07
# 主要改进:
#   ✅ 统一调用 scripts/ci/ci-run.sh 主编排脚本
#   ✅ 集中管理 CI/CD 逻辑，便于维护
#   ✅ 支持模块化构建和并行化执行
#   ✅ 完整的质量门禁和报告生成
#
# 项目语言: C (C11标准) | 构建系统: CMake 3.20+
# 适用平台: GitCode / GitHub / Gitee (三平台配置保持一致)

name: AgentOS CI

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE*'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: agentos-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release
  CI_MODULE: all
  CI_PARALLEL: auto

jobs:
  # ================================================================
  # Job 1: 统一CI流水线（调用 scripts/ci/ci-run.sh）
  # ================================================================
  unified-ci-pipeline:
    name: Unified CI Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run unified CI pipeline
        run: |
          chmod +x scripts/ci/ci-run.sh
          bash scripts/ci/ci-run.sh \
            --type ${{ env.BUILD_TYPE }} \
            --module ${{ env.CI_MODULE }} \
            --parallel ${{ env.CI_PARALLEL }} || {
            echo "::error::Unified CI pipeline failed"
            exit 1
          }

      # 上传测试结果
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_id }}
          path: |
            build-*/Testing/
            ci-logs/
          retention-days: 14

      # 失败时上传详细日志
      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-${{ github.run_id }}
          path: |
            ci-logs/
            build-*/CMakeFiles/**/*.log
          retention-days: 7

      # 上传制品
      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.run_id }}
          path: |
            ci-artifacts/*.tar.gz
          retention-days: 30

  # ================================================================
  # Job 2: 文档覆盖率检查（独立任务）
  # ================================================================
  documentation-check:
    name: Documentation Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check API documentation coverage
        run: |
          echo "📝 Checking documentation coverage..."
          
          # 查找所有公共头文件
          PUBLIC_HEADERS=$(find agentos/daemon agentos/commons agentos/atoms agentos/gateway agentos/heapstore -name "*.h" -path "*/include/*" 2>/dev/null)
          UNDOCUMENTED=0
          DOCUMENTED=0
          UNDOCUMENTED_FILES=""
          
          for header in $PUBLIC_HEADERS; do
            if grep -q "/**\|/*!\|///@" "$header"; then
              DOCUMENTED=$((DOCUMENTED + 1))
            else
              UNDOCUMENTED=$((UNDOCUMENTED + 1))
              UNDOCUMENTED_FILES="$UNDOCUMENTED_FILES\n  - $header"
            fi
          done
          
          TOTAL=$((DOCUMENTED + UNDOCUMENTED))
          
          echo "## Documentation Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total Headers | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          echo "| Documented | $DOCUMENTED |" >> $GITHUB_STEP_SUMMARY
          echo "| Undocumented | $UNDOCUMENTED |" >> $GITHUB_STEP_SUMMARY
          
          if [ $TOTAL -gt 0 ]; then
            COVERAGE=$((DOCUMENTED * 100 / TOTAL))
            echo "| Coverage Rate | ${COVERAGE}% |" >> $GITHUB_STEP_SUMMARY
            
            if [ $COVERAGE -lt 80 ]; then
              echo "::warning::Documentation coverage (${COVERAGE}%) is below 80% threshold"
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### Undocumented Files:" >> $GITHUB_STEP_SUMMARY
              echo -e "$UNDOCUMENTED_FILES" >> $GITHUB_STEP_SUMMARY
            else
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "✅ Documentation coverage meets threshold (≥80%)" >> $GITHUB_STEP_SUMMARY
            fi
          fi

  # ================================================================
  # Job 3: CI 状态汇总
  # ================================================================
  ci-status:
    name: CI Status Summary
    if: always()
    needs: [unified-ci-pipeline, documentation-check]
    runs-on: ubuntu-latest

    steps:
      - name: Generate status summary
        run: |
          echo "## 🚀 AgentOS CI Results (V3.0)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Unified CI Pipeline** | \`${{ needs.unified-ci-pipeline.result }}\` | Build, test, quality gate via ci-run.sh |" >> $GITHUB_STEP_SUMMARY
          echo "| **Documentation** | \`${{ needs.documentation-check.result }}\` | API docs coverage check |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*Generated at $(date -u '+%Y-%m-%d %H:%M:%S UTC')*" >> $GITHUB_STEP_SUMMARY

      - name: Check overall result
        run: |
          FAIL=0
          [ "${{ needs.unified-ci-pipeline.result }}" != "success" ] && FAIL=1
          [ "${{ needs.documentation-check.result }}" != "success" ] && FAIL=1
          
          if [ "$FAIL" -eq 1 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## ❌ CI Failed" >> $GITHUB_STEP_SUMMARY
            echo "One or more checks failed. Please review the details above." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## ✅ All Checks Passed!" >> $GITHUB_STEP_SUMMARY
            echo "Build, tests, quality gates, and documentation checks all passed." >> $GITHUB_STEP_SUMMARY
          fi