# Documentation Consistency Check (GitCode Actions)
#
# 版本: V1.0 - 2026-04-10
# 定位: 文档一致性自动化检查
# 主要职责:
#   ✅ 检查断裂的文档链接
#   ✅ 验证文档版本一致性
#   ✅ 检查术语使用一致性
#   ✅ 验证文档元数据完整性
#
# 注意: 此工作流在文档变更时触发，确保文档质量

name: Documentation Consistency Check

on:
  push:
    paths:
      - 'docs/**/*.md'
      - '*.md'
  pull_request:
    paths:
      - 'docs/**/*.md'
      - '*.md'

permissions:
  contents: read

jobs:
  # ================================================================
  # Job 1: 检查断裂链接
  # ================================================================
  check-broken-links:
    name: Check Broken Links
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            grep \
            sed \
            findutils
        
      - name: Check broken Markdown links
        id: link-check
        run: |
          echo "🔗 Checking for broken Markdown links..."
          
          # 查找所有Markdown文件
          find docs -name "*.md" -type f | while read -r file; do
            echo "Checking $file..."
            
            # 提取所有相对链接
            grep -oP '\]\([^)]+\.md\)' "$file" | sed 's/\]\((.*)\)/\1/' | while read -r link; do
              # 清理链接，移除可能的锚点
              clean_link=$(echo "$link" | sed 's/#.*//')
              
              # 如果链接以./或../开头，相对于当前文件解析
              if [[ "$clean_link" == .* ]]; then
                target_file="$(dirname "$file")/$clean_link"
              else
                target_file="docs/$clean_link"
              fi
              
              # 检查文件是否存在
              if [ ! -f "$target_file" ]; then
                echo "❌ Broken link in $file: $link -> $target_file"
                echo "::error file=$file,title=Broken Link::Link '$link' points to non-existent file"
              fi
            done
          done
          
          echo "✅ Link check completed"
    
  # ================================================================
  # Job 2: 检查版本一致性
  # ================================================================
  check-version-consistency:
    name: Check Version Consistency
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Check version consistency
        run: |
          echo "📚 Checking document version consistency..."
          
          # 查找所有版本声明
          echo "Current document versions found:"
          grep -r "版本.*Doc V" docs/ --include="*.md" | sort
          
          # 检查是否有非V1.8版本（允许V1.0用于模板文档）
          inconsistent_versions=$(grep -r "版本.*Doc V" docs/ --include="*.md" | \
            grep -v "Doc V1.8" | \
            grep -v "Doc V1.0" | \
            wc -l)
          
          if [ "$inconsistent_versions" -gt 0 ]; then
            echo "❌ Found documents with inconsistent versions:"
            grep -r "版本.*Doc V" docs/ --include="*.md" | \
              grep -v "Doc V1.8" | \
              grep -v "Doc V1.0"
            echo "::error title=Version Inconsistency::Found documents with versions other than Doc V1.8 or Doc V1.0"
            exit 1
          else
            echo "✅ All documents have consistent versions (Doc V1.8 or Doc V1.0 for templates)"
          fi
  
  # ================================================================
  # Job 3: 检查术语一致性
  # ================================================================
  check-terminology-consistency:
    name: Check Terminology Consistency
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Check terminology usage
        run: |
          echo "📖 Checking terminology consistency..."
          
          # 检查核心术语使用
          # 定义要检查的术语和它们的正确格式
          declare -A TERMS=(
            ["Agent"]="智能体 (Agent)"
            ["Skill"]="技能 (Skill)"
            ["Syscall"]="系统调用 (Syscall)"
            ["CoreLoopThree"]="核心循环三层 (CoreLoopThree)"
            ["MemoryRovol"]="记忆卷载 (MemoryRovol)"
            ["cupolas"]="安全穹顶 (cupolas)"
          )
          
          errors_found=0
          
          for term in "${!TERMS[@]}"; do
            correct_format="${TERMS[$term]}"
            
            echo "Checking usage of '$term'..."
            
            # 查找可能不正确的使用（单独出现的英文术语，没有中文）
            # 这里简化检查，实际可能需要更复杂的模式匹配
            # 注意：这个检查可能产生误报，需要人工验证
            if grep -r -i "\b$term\b" docs/ --include="*.md" | grep -v "($term)" | grep -v "${TERMS[$term]}" | head -5; then
              echo "⚠️  Potential inconsistent usage of '$term' found. Should use '$correct_format'"
              # 不退出，只是警告
              errors_found=$((errors_found + 1))
            fi
          done
          
          if [ "$errors_found" -gt 0 ]; then
            echo "⚠️  Terminology consistency check found potential issues. Please review."
            echo "::warning title=Terminology Consistency::Potential terminology inconsistencies found. Please review."
          else
            echo "✅ Terminology usage appears consistent"
          fi
  
  # ================================================================
  # Job 4: 检查元数据完整性
  # ================================================================
  check-metadata:
    name: Check Metadata Completeness
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Check document metadata
        run: |
          echo "📋 Checking document metadata completeness..."
          
          missing_metadata=0
          
          # 检查关键文档是否包含基本元数据
          important_docs=(
            "docs/Capital_Guides/getting_started.md"
            "docs/Capital_Guides/installation.md"
            "docs/Capital_Guides/configuration.md"
            "docs/Capital_Specifications/TERMINOLOGY.md"
            "docs/Capital_Specifications/agentos_contract/agent_contract.md"
            "docs/Capital_Specifications/agentos_contract/skill_contract.md"
          )
          
          for doc in "${important_docs[@]}"; do
            if [ -f "$doc" ]; then
              echo "Checking $doc..."
              
              # 检查是否有版本字段
              if ! grep -q "版本" "$doc"; then
                echo "❌ $doc missing version field"
                missing_metadata=$((missing_metadata + 1))
              fi
              
              # 检查是否有最后更新字段
              if ! grep -q "最后更新" "$doc"; then
                echo "❌ $doc missing last_updated field"
                missing_metadata=$((missing_metadata + 1))
              fi
              
              # 检查是否有作者字段
              if ! grep -q "作者" "$doc"; then
                echo "❌ $doc missing author field"
                missing_metadata=$((missing_metadata + 1))
              fi
            else
              echo "⚠️  $doc not found, skipping"
            fi
          done
          
          if [ "$missing_metadata" -gt 0 ]; then
            echo "❌ Found $missing_metadata missing metadata fields"
            echo "::error title=Metadata Incomplete::Some documents are missing required metadata fields"
            exit 1
          else
            echo "✅ All important documents have required metadata"
          fi