# Automated Quality Monitoring System (V1.0)
#
# AgentOS 自动化质量监控系统
# 集成到 CI/CD 流水线，提供持续质量监控
#
# 功能特性:
#   ✅ 实时代码质量指标收集
#   ✅ 质量门禁自动执行
#   ✅ 每日质量报告生成
#   ✅ 质量趋势追踪与预警
#   ✅ 技术债务识别与管理
#   ✅ 代码覆盖率监控
#   ✅ 性能基准测试对比

name: Quality Monitoring

on:
  # 定时任务：每天 UTC 02:00 运行（北京时间 10:00）
  schedule:
    - cron: '0 2 * * *'
  
  # 手动触发
  workflow_dispatch:
    inputs:
      full_analysis:
        description: '执行完整分析（包含性能测试）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
  
  # PR 触发
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write
  issues: write

env:
  # 质量阈值配置
  QUALITY_THRESHOLD_COMPLEXITY: "10"           # 最大圈复杂度
  QUALITY_THRESHOLD_DUPLICATION: "3"          # 最大重复率 (%)
  QUALITY_THRESHOLD_COVERAGE: "90"            # 最小测试覆盖率 (%)
  QUALITY_THRESHOLD_FUNCTION_LENGTH: "100"     # 最大函数长度 (行)
  QUALITY_THRESHOLD_FILE_LENGTH: "500"         # 最大文件长度 (行)

jobs:
  # ================================================================
  # Job 1: 代码质量实时监控
  # ================================================================
  quality-monitoring:
    name: Code Quality Monitoring
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史用于趋势分析

      - name: Set up Python for analysis
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install quality tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cppcheck \
            jq \
            lcov \
            gcov \
            python3-pip
          
          pip3 install --break-system-packages \
            radon \
            xenon \
            pylint \
            coverage \
            bandit

      - name: Run static analysis (cppcheck)
        id: cppcheck
        continue-on-error: true
        run: |
          echo "🔍 Running Cppcheck static analysis..."
          
          # 配置 cppcheck
          cat > cppcheck.cfg << 'EOF'
          --enable=all
          --suppress=missingIncludeSystem
          --std=c11
          --language=c
          --quiet
          --xml
          --output-file=cppcheck-results.xml
          EOF
          
          # 分析核心模块
          cppcheck @cppcheck.cfg agentos/atoms agentos/commons agentos/daemon || true
          
          # 统计问题数量
          ERROR_COUNT=$(grep -c '<error' cppcheck-results.xml 2>/dev/null || echo "0")
          WARNING_COUNT=$(grep -c '<warning' cppcheck-results.xml 2>/dev/null || echo "0")
          STYLE_COUNT=$(grep -c '<style' cppcheck-results.xml 2>/dev/null || echo "0")
          
          echo "cppcheck_errors=${ERROR_COUNT}" >> $GITHUB_OUTPUT
          echo "cppcheck_warnings=${WARNING_COUNT}" >> $GITHUB_OUTPUT
          echo "cppcheck_style=${STYLE_COUNT}" >> $GITHUB_OUTPUT
          
          echo "📊 Cppcheck Results:"
          echo "   Errors: ${ERROR_COUNT}"
          echo "   Warnings: ${WARNING_COUNT}"
          echo "   Style Issues: ${STYLE_COUNT}"

      - name: Calculate complexity metrics
        id: complexity
        run: |
          echo "📈 Calculating code complexity metrics..."
          
          # 使用 radon 分析 Python 代码（如果有）
          if [ -d "agentos/toolkit/python" ]; then
            radon cc agentos/toolkit/python -a -nc > python-complexity.txt 2>/dev/null || true
            echo "📝 Python Complexity Report:"
            head -30 python-complexity.txt
          fi
          
          # 分析 C/C++ 代码复杂度（简化版）
          COMPLEXITY_REPORT=""
          HIGH_COMPLEXITY_FUNCTIONS=0
          
          # 查找高圈复杂度函数 (>10)
          while IFS= read -r file; do
            if [[ "$file" == *.c ]] || [[ "$file" == *.h ]]; then
              # 简单的复杂度估算（基于控制流关键字）
              FUNC_COMPLEXITY=$(awk '
                /^{.*\)/ {
                  func_name = $0
                  gsub(/.*\(/, "", func_name)
                  gsub(/\).*/, "", func_name)
                  brace_count = 0
                  line_count = 0
                  complex = 1
                }
                {line_count++}
                /if|for|while|case|catch|\|\||&&/ {complex++}
                /\{/ {brace_count++}
                /\}/ {
                  brace_count--
                  if (brace_count == 0 && line_count > 5) {
                    if (complex > 10) {
                      print FILENAME":"NR": "func_name" (CC="complex")"
                    }
                    line_count = 0
                    complex = 1
                  }
                }
              ' "$file")
              
              if [ -n "$FUNC_COMPLEXITY" ]; then
                COMPLEXITY_REPORT="${COMPLEXITY_REPORT}\n${FUNC_COMPLEXITY}"
                HIGH_COMPLEXITY_FUNCTIONS=$((HIGH_COMPLEXITY_FUNCTIONS + $(echo "$FUNC_COMPLEXITY" | wc -l)))
              fi
            fi
          done < <(find agentos -type f \( -name "*.c" -o -name "*.h" \) 2>/dev/null | head -100)
          
          echo "high_complexity_functions=${HIGH_COMPLEXITY_FUNCTIONS}" >> $GITHUB_OUTPUT
          
          if [ "${HIGH_COMPLEXITY_FUNCTIONS}" -gt 0 ]; then
            echo "⚠️ Found ${HIGH_COMPLEXITY_FUNCTIONS} functions with CC > 10"
          else
            echo "✅ All functions have acceptable complexity"
          fi

      - name: Check test coverage
        id: coverage
        continue-on-error: true
        run: |
          echo "🧪 Checking test coverage..."
          
          # 如果有构建好的项目，运行覆盖率检查
          if [ -f "build-*/CTestTestfile.cmake" ]; then
            cd build-* && ctest --output-on-failure --coverage || true
            
            # 生成覆盖率报告
            lcov --capture --directory . --output-file coverage.info || true
            genhtml coverage.info --output-directory coverage-report || true
            
            COVERAGE_PERCENT=$(lcov --summary coverage.info 2>/dev/null | grep "lines" | awk '{print $2}' | sed 's/%//')
            
            if [ -n "$COVERAGE_PERCENT" ]; then
              echo "coverage_percent=${COVERAGE_PERCENT}" >> $GITHUB_OUTPUT
              echo "📊 Test Coverage: ${COVERAGE_PERCENT}%"
            else
              echo "coverage_percent=0" >> $GITHUB_OUTPUT
              echo "⚠️ Could not determine coverage percentage"
            fi
          else
            echo "coverage_percent=0" >> $GITHUB_OUTPUT
            echo "ℹ️ No build found, skipping coverage check"
          fi

      - name: Generate quality report
        run: |
          cat > quality-report.md << 'EOF'
          # 📊 AgentOS Quality Monitoring Report
          
          **Generated**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          **Commit**: ${{ github.sha }}
          **Branch**: ${{ github.ref_name }}
          
          ## Executive Summary
          
          | Metric | Current | Threshold | Status |
          |--------|---------|-----------|--------|
          | Cppcheck Errors | ${{ steps.cppcheck.outputs.cppcheck_errors }} | < 10 | $([ ${{ steps.cppcheck.outputs.cppcheck_errors }} -lt 10 ] && echo "✅ Pass" || echo "❌ Fail") |
          | High Complexity Functions | ${{ steps.complexity.outputs.high_complexity_functions }} | < 5 | $([ ${{ steps.complexity.outputs.high_complexity_functions }} -lt 5 ] && echo "✅ Pass" || echo "❌ Fail") |
          | Test Coverage | ${{ steps.coverage.outputs.coverage_percent }}% | ≥ $QUALITY_THRESHOLD_COVERAGE% | $([ ${{ steps.coverage.outputs.coverage_percent }} -ge $QUALITY_THRESHOLD_COVERAGE ] && echo "✅ Pass" || echo "❌ Fail") |
          
          ## Details
          
          ### Static Analysis (Cppcheck)
          
          - **Errors**: ${{ steps.cppcheck.outputs.cppcheck_errors }}
          - **Warnings**: ${{ steps.cppcheck.outputs.cppcheck_warnings }}
          - **Style Issues**: ${{ steps.cppcheck.outputs.csscheck_style }}
          
          ### Code Complexity
          
          - **Functions with CC > 10**: ${{ steps.complexity.outputs.high_complexity_functions }}
          - **Target**: All functions should have cyclomatic complexity ≤ 10
          
          ### Test Coverage
          
          - **Current Coverage**: ${{ steps.coverage.outputs.coverage_percent }}%
          - **Target**: ≥ $QUALITY_THRESHOLD_COVERAGE%
          
          ## Recommendations
          
          Based on the analysis results:
          
          1. **If high complexity functions exist**:
             - Consider refactoring to reduce complexity
             - Extract helper functions or use strategy pattern
             - Review control flow logic
          
          2. **If coverage is below threshold**:
             - Add more unit tests for uncovered paths
             - Focus on edge cases and error handling
             - Consider integration tests for component interactions
          
          3. **If static analysis shows errors/warnings**:
             - Fix critical errors immediately
             - Address warnings in next sprint
             - Update documentation for intentional violations
          
          ---
          
          *Report generated by Quality Monitoring System V1.0*
          EOF
          
          echo "📋 Quality Report Generated:"
          cat quality-report.md

      - name: Upload quality artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-reports-${{ github.run_id }}
          path: |
            quality-report.md
            cppcheck-results.xml
            coverage-report/
          retention-days: 30

      - name: Create quality issue if thresholds exceeded
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 检查是否需要创建质量问题 Issue
          SHOULD_CREATE_ISSUE=false
          ISSUE_TITLE="Quality Gate Failed - $(date +%Y-%m-%d)"
          ISSUE_BODY=""
          
          # 检查各项指标
          if [ "${{ steps.cppcheck.outputs.cppcheck_errors }}" -ge 10 ]; then
            SHOULD_CREATE_ISSUE=true
            ISSUE_BODY="${ISSUE_BODY}\n\n### 🔴 Cppcheck Errors: ${{ steps.cppcheck.outputs.cppcheck_errors }}"
          fi
          
          if [ "${{ steps.complexity.outputs.high_complexity_functions }}" -ge 5 ]; then
            SHOULD_CREATE_ISSUE=true
            ISSUE_BODY="${ISSUE_BODY}\n\n### ⚠️ High Complexity Functions: ${{ steps.complexity.outputs.high_complexity_functions }}"
          fi
          
          if [ "$SHOULD_CREATE_ISSUE" = "true" ]; then
            gh issue create \
              --title "$ISSUE_TITLE" \
              --body "$ISSUE_BODY" \
              --label "quality-gate,automated" \
              --assignee "${{ github.actor }}" || true
            
            echo "📝 Created quality issue: $ISSUE_TITLE"
          else
            echo "✅ All quality thresholds passed!"
          fi

  # ================================================================
  # Job 2: 性能基准测试（可选）
  # ================================================================
  performance-benchmarking:
    name: Performance Benchmarking
    runs-on: ubuntu-latest
    needs: quality-monitoring
    if: github.event.inputs.full_analysis == 'true' || github.event_name == 'schedule'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build project
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON
          make -j$(nproc)

      - name: Run performance benchmarks
        run: |
          cd build
          
          # 运行性能基准测试（如果存在）
          if [ -f "tests/perf/benchmark_all" ]; then
            echo "⚡ Running performance benchmarks..."
            ./tests/perf/benchmark_all --benchmark_format=json > benchmark-results.json
            
            # 生成性能报告
            echo "# Performance Benchmark Results" > performance-report.md
            echo "" >> performance-report.md
            echo "**Date**: $(date)" >> performance-report.md
            echo "" >> performance-report.md
            
            # 解析结果并生成表格
            if command -v jq &> /dev/null; then
              echo "## Benchmark Summary" >> performance-report.md
              echo "" >> performance-report.md
              echo "| Test | Mean (μs) | Median (μs) | StdDev | Status |" >> performance-report.md
              echo "|------|------------|-------------|--------|--------|" >> performance-report.md
              
              jq -r '.benchmarks[] | "| \(.name) | \(.mean) | \(.median) | \(.stddev) | ✅ |"' benchmark-results.json >> performance-report.md
            fi
            
            cat performance-report.md
          else
            echo "ℹ️ No benchmark suite found"
          fi

      - name: Upload performance results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-results-${{ github.run_id }}
          path: |
            benchmark-results.json
            performance-report.md
          retention-days: 90

  # ================================================================
  # Job 3: 技术债务追踪
  # ================================================================
  technical-debt-tracking:
    name: Technical Debt Tracking
    runs-on: ubuntu-latest
    needs: quality-monitoring
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Analyze technical debt
        run: |
          echo "🔍 Analyzing technical debt..."
          
          # 统计 TODO/FIXME 标记
          TODO_COUNT=$(grep -r "TODO\|FIXME" --include="*.c" --include="*.h" --include="*.py" agentos/ 2>/dev/null | wc -l)
          
          # 统计过大的文件 (>500行)
          LARGE_FILES=$(find agentos -type f \( -name "*.c" -o -name "*.h" \) -exec wc -l {} + 2>/dev/null | awk '$1 > 500 {print $0}' | wc -l)
          
          # 统计未使用的导入/包含
          UNUSED_IMPORTS=0  # 需要更复杂的静态分析工具
          
          echo "Technical Debt Metrics:"
          echo "- TODO/FIXME Count: ${TODO_COUNT}"
          echo "- Large Files (>500 lines): ${LARGE_FILES}"
          
          # 保存为 JSON 格式供后续使用
          cat > tech-debt.json << EOF
          {
            "date": "$(date -Iseconds)",
            "todo_count": ${TODO_COUNT},
            "large_files": ${LARGE_FILES},
            "unused_imports": ${UNUSED_IMPORTS}
          }
          EOF

      - name: Update technical debt dashboard
        if: always()
        run: |
          # 创建或更新技术债务 Issue（每周一次）
          DAY_OF_WEEK=$(date +%u)
          
          if [ "$DAY_OF_WEEK" -eq 1 ]; then  # 周一
            gh issue list --label "technical-debt" --state open --json number --jq '.[0].number' > existing_issue.txt
            
            if [ ! -s existing_issue.txt ] || [ "$(cat existing_issue.txt)" = "[]" ]; then
              gh issue create \
                --title "Weekly Technical Debt Report - $(date +%Y-%m-%d)" \
                --body "## Technical Debt Summary\n\nThis is an automated weekly report.\n\nSee attached `tech-debt.json` for details." \
                --label "technical-debt,weekly-report" \
                --attach tech-debt.json || true
            else
              # 更新现有 Issue
              ISSUE_NUMBER=$(cat existing_issue.txt | jq -r '.[0]')
              gh issue comment $ISSUE_NUMBER --body "## Weekly Update ($(date +%Y-%m-%d))\n\nUpdated metrics attached." --edit-last || true
            fi
          fi

      - name: Upload technical debt data
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tech-debt-data-${{ github.run_id }}
          path: tech-debt.json
          retention-days: 365  # 保留一年用于趋势分析