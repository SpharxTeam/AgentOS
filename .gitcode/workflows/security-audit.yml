name: Security Audit

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      full_scan:
        description: 'Run full security scan'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read
  security-events: write
  issues: write
  pull-requests: write

jobs:
  dependency-audit:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.txt
          retention-days: 30

  code-security-scan:
    name: Code Security Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: c,cpp,python,javascript,typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:codeql"

  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast-analysis:
    name: Static Application Security Testing
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run cppcheck with security rules
        run: |
          cppcheck --enable=all \
            --std=c11 \
            --force \
            --suppress=missingIncludeSystem \
            --error-exitcode=0 \
            --xml \
            agentos/daemon/common/src \
            agentos/daemon/*/src \
            agentos/atoms/*/src \
            agentos/commons/src \
            2> cppcheck-security.xml || true

      - name: Parse and report findings
        run: |
          echo "SAST analysis completed"
          echo "Result file: cppcheck-security.xml"
          
          if [ -f cppcheck-security.xml ]; then
            ERRORS=$(grep -c '<error' cppcheck-security.xml 2>/dev/null || echo "0")
            WARNINGS=$(grep -c '<warning' cppcheck-security.xml 2>/dev/null || echo "0")
            echo "   Errors: $ERRORS"
            echo "   Warnings: $WARNINGS"
          fi

      - name: Upload SAST results
        uses: actions/upload-artifact@v4
        with:
          name: sast-results
          path: cppcheck-security.xml
          retention-days: 90

  generate-report:
    name: Generate Security Report
    needs: [dependency-audit, code-security-scan, secrets-scan, sast-analysis]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create summary
        run: |
          echo "# AgentOS Security Report" > SECURITY_REPORT.md
          echo "" >> SECURITY_REPORT.md
          echo "**Generated**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> SECURITY_REPORT.md
          echo "" >> SECURITY_REPORT.md
          echo "## Summary" >> SECURITY_REPORT.md
          echo "" >> SECURITY_REPORT.md
          echo "| Check | Status | Details |" >> SECURITY_REPORT.md
          echo "|---------|--------|---------|" >> SECURITY_REPORT.md
          echo "| Dependency Scan | Done | artifacts/trivy-results |" >> SECURITY_REPORT.md
          echo "| CodeQL Analysis | Done | GitHub Security tab |" >> SECURITY_REPORT.md
          echo "| Secrets Detection | Done | Gitleaks output |" >> SECURITY_REPORT.md
          echo "| SAST Analysis | Done | artifacts/sast-results |" >> SECURITY_REPORT.md
          echo "" >> SECURITY_REPORT.md
          echo "## Recommendations" >> SECURITY_REPORT.md
          echo "" >> SECURITY_REPORT.md
          echo "1. Regularly check for dependency updates" >> SECURITY_REPORT.md
          echo "2. Fix high-severity vulnerabilities promptly" >> SECURITY_REPORT.md
          echo "3. Follow secure coding practices" >> SECURITY_REPORT.md
          echo "" >> SECURITY_REPORT.md
          echo "---" >> SECURITY_REPORT.md
          echo "*Report generated automatically*" >> SECURITY_REPORT.md

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: SECURITY_REPORT.md
          retention-days: 365
