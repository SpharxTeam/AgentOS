name: Python SDK CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'agentos/toolkit/python/**'
  pull_request:
    branches: [main]
    paths:
      - 'agentos/toolkit/python/**'

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        working-directory: agentos/toolkit/python

      - name: Run Black
        run: black --check --diff agentos tests
        working-directory: agentos/toolkit/python

      - name: Run isort
        run: isort --check-only --diff agentos tests
        working-directory: agentos/toolkit/python

      - name: Run Flake8
        run: flake8 agentos tests --count --select=E9,F63,F7,F82 --show-source --statistics
        working-directory: agentos/toolkit/python

      - name: Run MyPy
        run: mypy agentos --ignore-missing-imports
        working-directory: agentos/toolkit/python

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        working-directory: agentos/toolkit/python

      - name: Run tests
        run: pytest tests/ -v --cov=agentos --cov-report=xml --cov-report=term-missing
        working-directory: agentos/toolkit/python

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: ./agentos/toolkit/python/coverage.xml
          flags: python
          name: codecov-python
        continue-on-error: true

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build wheel

      - name: Build package
        run: python -m build
        working-directory: agentos/toolkit/python

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: agentos/toolkit/python/dist
          retention-days: 7

  security:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Run Bandit
        run: bandit -r agentos -ll
        working-directory: agentos/toolkit/python
        continue-on-error: true

      - name: Run Safety
        run: safety check --full-report
        working-directory: agentos/toolkit/python
        continue-on-error: true
