# Code Quality Gate (GitCode Actions)
#
# 优化版本 V2.0 - 2026-04-06
# 定位: 高级质量分析（与基础CI分离）
# 主要职责:
#   ✅ 代码复杂度深度分析
#   ✅ 代码度量指标统计
#   ✅ Manager模块专项测试
#   ✅ 质量趋势追踪
#   ✅ 技术债务识别
#
# 注意: 基础检查（格式化、linting）已在 ci.yml 中完成

name: Code Quality Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # ================================================================
  # Job 1: 代码复杂度深度分析
  # ================================================================
  complexity-analysis:
    name: Complexity Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install analysis tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            python3 \
            jq

      - name: Calculate code metrics
        id: metrics
        run: |
          echo "📊 Analyzing code complexity and metrics..."
          
          # 定义源码目录
          SRC_DIRS="daemon commons atoms gateway heapstore manager toolkit"
          
          # 统计总代码行数
          TOTAL_LOC=$(find $SRC_DIRS \( -name '*.c' -o -name '*.h' \) -type f | xargs wc -l 2>/dev/null | tail -1 | awk '{print $1}')
          TOTAL_FILES=$(find $SRC_DIRS \( -name '*.c' -o -name '*.h' \) -type f | wc -l)
          
          echo "total_loc=${TOTAL_LOC:-0}" >> $GITHUB_OUTPUT
          echo "total_files=${TOTAL_FILES:-0}" >> $GITHUB_OUTPUT
          
          echo "📈 Total Lines of C/C++ Code: ${TOTAL_LOC:-0}"
          echo "📁 Total Files: ${TOTAL_FILES:-0}"
          
          # 找出最大的文件 (Top 15)
          echo ""
          echo "🔍 Top 15 Largest Files (by LOC):"
          find $SRC_DIRS \( -name '*.c' -o -name '*.h' \) -exec wc -l {} + 2>/dev/null | sort -rn | head -15 | awk '{printf "%6d lines  %s\n", $1, $2}'
          
          # 检测可能过长的函数 (>100行)
          LONG_FUNCTIONS=$(find agentos/daemon/common/src agentos/daemon/*/src agentos/atoms/*/src agentos/commons/src -name "*.c" -type f 2>/dev/null | while read file; do
            awk '/^{$/{start=NR} /^}$/{if(start && NR-start>100){print FILENAME":"start"-"NR" ("(NR-start)" lines)"; start=0}}' "$file"
          done)
          
          if [ -n "$LONG_FUNCTIONS" ]; then
            echo ""
            echo "⚠️ Functions Exceeding 100 Lines:"
            echo "$LONG_FUNCTIONS" | head -20
          else
            echo ""
            echo "✅ No functions exceeding 100 lines found"
          fi

      - name: Generate complexity report
        run: |
          cat > complexity-report.md << 'EOF'
          # Code Complexity Report
          
          **Generated**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          
          ## Summary Metrics
          
          | Metric | Value |
          |--------|-------|
          | Total LOC | See CI output |
          | Files Analyzed | See CI output |
          | Target CC per Function | < 10 |
          | Target Nesting Depth | < 4 levels |
          | Target Function Length | < 100 lines |
          
          ## Guidelines
          
          - Keep functions under 100 lines for maintainability
          - Maintain cyclomatic complexity under 10
          - Avoid deeply nested conditionals (>4 levels)
          - Prefer early returns over deep nesting
          - Extract complex logic into helper functions
          
          ---
          
          *Report generated by AgentOS Quality Gate*
          EOF
          
          cat complexity-report.md

      - name: Upload complexity report
        uses: actions/upload-artifact@v4
        with:
          name: complexity-report-${{ github.run_id }}
          path: complexity-report.md
          retention-days: 30

  # ================================================================
  # Job 2: Manager 模块测试 (专项)
  # ================================================================
  manager-module-tests:
    name: Manager Module Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pyyaml jsonschema requests

      - name: Run Manager configuration tests
        run: |
          echo "🔧 Running Manager module configuration tests..."
          if [ -f agentos/manager/tests/run_all_tests.py ]; then
            cd agentos/manager/tests
            python run_all_tests.py --verbose || true
          else
            echo "::warning::Manager test runner not found, skipping"
          fi

      - name: Run Manager unit tests with coverage
        run: |
          echo "🧪 Running Manager unit tests..."
          if [ -d agentos/toolkit/python ] && [ -f agentos/toolkit/python/tests/test_managers.py ]; then
            cd agentos/toolkit/python
            pytest tests/test_managers.py -v \
              --cov=agentos.modules \
              --cov-report=xml \
              --cov-report=term-missing \
              --cov-fail-under=80 || true
          else
            echo "::warning::Manager unit tests not found, skipping"
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manager-coverage-${{ github.run_id }}
          path: agentos/toolkit/python/coverage.xml
          retention-days: 14
          if-no-files-found: ignore

      - name: Generate test summary
        run: |
          echo "## Manager Module Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Suites Executed:" >> $GITHUB_STEP_SUMMARY
          echo "- Configuration validation tests" >> $GITHUB_STEP_SUMMARY
          echo "- Schema compliance tests" >> $GITHUB_STEP_SUMMARY
          echo "- Unit tests (TaskManager, SessionManager, MemoryManager, SkillManager)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Coverage Threshold: ≥80%" >> $GITHUB_STEP_SUMMARY

  # ================================================================
  # Job 3: 文档覆盖率检查 (增强版)
  # ================================================================
  documentation-check:
    name: Documentation Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check API documentation coverage (enhanced)
        run: |
          echo "📝 Checking documentation coverage (enhanced)..."
          
          PUBLIC_HEADERS=$(find daemon commons atoms gateway heapstore -name "*.h" -path "*/include/*" 2>/dev/null)
          UNDOCUMENTED=0
          DOCUMENTED=0
          PARTIAL=0
          UNDOCUMENTED_LIST=""
          
          for header in $PUBLIC_HEADERS; do
            DOC_LINES=$(grep -c "/**\|/*!\|///@" "$header" 2>/dev/null || echo "0")
            TOTAL_LINES=$(wc -l < "$header")
            
            if [ "$DOC_LINES" -gt 5 ]; then
              DOCUMENTED=$((DOCUMENTED + 1))
            elif [ "$DOC_LINES" -gt 0 ]; then
              PARTIAL=$((PARTIAL + 1))
            else
              UNDOCUMENTED=$((UNDOCUMENTED + 1))
              UNDOCUMENTED_LIST="$UNDOCUMENTED_LIST\n  - $header"
            fi
          done
          
          TOTAL=$((DOCUMENTED + PARTIAL + UNDOCUMENTED))
          
          echo "## Documentation Coverage Report (Enhanced)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Category | Count | Percentage |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Fully Documented | $DOCUMENTED | $([ $TOTAL -gt 0 ] && echo $(( DOCUMENTD * 100 / TOTAL )) || echo 'N/A')% |" >> $GITHUB_STEP_SUMMARY
          echo "| Partially Documented | $PARTIAL | $([ $TOTAL -gt 0 ] && echo $(( PARTIAL * 100 / TOTAL )) || echo 'N/A')% |" >> $GITHUB_STEP_SUMMARY
          echo "| Undocumented | $UNDOCUMENTED | $([ $TOTAL -gt 0 ] && echo $(( UNDOCUMENTED * 100 / TOTAL )) || echo 'N/A')% |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total** | **$TOTAL** | **100%** |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          EFFECTIVE_COVERAGE=$(( (DOCUMENTED * 100 + PARTIAL * 50) / TOTAL ))
          echo "**Effective Coverage**: ${EFFECTIVE_COVERAGE}%" >> $GITHUB_STEP_SUMMARY
          
          if [ "$EFFECTIVE_COVERAGE" -lt 75 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "�️ Documentation coverage below recommended threshold (75%)" >> $GITHUB_STEP_SUMMARY
            if [ -n "$UNDOCUMENTED_LIST" ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### Undocumented Files:" >> $GITHUB_STEP_SUMMARY
              echo -e "$UNDOCUMENTED_LIST" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ Documentation coverage meets threshold (≥75%)"
          fi

  # ================================================================
  # Job 4: 质量门禁决策
  # ================================================================
  quality-gate:
    name: Quality Gate Decision
    needs: [complexity-analysis, manager-module-tests, documentation-check]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Generate quality gate report
        run: |
          echo "## 🎯 Quality Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status | Description |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|-------------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Complexity Analysis** | \`${{ needs.complexity-analysis.result }}\` | Code metrics and complexity check |" >> $GITHUB_STEP_SUMMARY
          echo "| **Manager Tests** | \`${{ needs.manager-module-tests.result }}\` | Module-specific unit tests |" >> $GITHUB_STEP_SUMMARY
          echo "| **Documentation** | \`${{ needs.documentation-check.result }}\` | API docs coverage (≥75%) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Make quality gate decision
        run: |
          PASS=true
          
          if [ "${{ needs.complexity-analysis.result }}" != "success" ]; then
            echo "- ❌ Complexity Analysis failed" >> $GITHUB_STEP_SUMMARY
            PASS=false
          else
            echo "- ✅ Complexity Analysis passed" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.manager-module-tests.result }}" != "success" ]; then
            echo "- ❌ Manager Tests failed" >> $GITHUB_STEP_SUMMARY
            PASS=false
          else
            echo "- ✅ Manager Tests passed" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.documentation-check.result }}" != "success" ]; then
            echo "- ❌ Documentation check failed" >> $GITHUB_STEP_SUMMARY
            PASS=false
          else
            echo "- ✅ Documentation check passed" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "$PASS" = true ]; then
            echo "## ✅ Quality Gate PASSED" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "All advanced quality checks have passed." >> $GITHUB_STEP_SUMMARY
            echo "The codebase meets the quality standards for merging." >> $GITHUB_STEP_SUMMARY
            exit 0
          else
            echo "## ❌ Quality Gate FAILED" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Some quality checks did not pass. Please review the details above." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
