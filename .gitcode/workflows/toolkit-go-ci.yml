name: Go SDK CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'agentos/toolkit/go/**'
  pull_request:
    branches: [main]
    paths:
      - 'agentos/toolkit/go/**'

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: agentos/toolkit/go/go.sum

      - name: Run gofmt
        run: |
          if [ -n "$(gofmt -l agentos/toolkit/go)" ]; then
            echo "Code formatting issues found:"
            gofmt -l agentos/toolkit/go
            exit 1
          fi
        working-directory: agentos/toolkit/go

      - name: Run golint
        run: go install golang.org/x/lint/gotint@latest && gotint -set_exit_status ./...
        working-directory: agentos/toolkit/go
        continue-on-error: true

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: agentos/toolkit/go/go.sum

      - name: Download dependencies
        run: go mod download
        working-directory: agentos/toolkit/go

      - name: Run tests with coverage
        run: |
          go test -v -coverprofile=coverage.out -covermode=atomic ./...
        working-directory: agentos/toolkit/go

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./agentos/toolkit/go/coverage.out
          flags: go
          name: codecov-go
        continue-on-error: true

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: agentos/toolkit/go/go.sum

      - name: Build package
        run: go build -v ./...
        working-directory: agentos/toolkit/go

      - name: Verify build output
        run: |
          go build -o /dev/null ./...
        working-directory: agentos/toolkit/go

  vet:
    name: Run go vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: agentos/toolkit/go/go.sum

      - name: Run go vet
        run: go vet ./...
        working-directory: agentos/toolkit/go
